services:
  mofox:
    build: .
    container_name: mofox-bot
    restart: unless-stopped
    volumes:
      # 将配置、数据和日志文件夹物理映射到宿主机
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      # 建议也将插件目录映射，方便动态开发
      - ./plugins:/app/plugins
    environment:
      # 设置容器时区为上海
      - TZ=Asia/Shanghai
    # 启用交互模式，支持 Rich 等库的终端控制台输出
    stdin_open: true
    tty: true

networks:
  default:
    name: mofox-network
