<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC0CB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB6C1"/><stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8BBD0"/><stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE0EC"/><stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#2D2D3E"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#FAFAFA"/>
  <text x="600" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">三大设计原则 · 动态咬合的三角</text>
  <text x="600" y="76" text-anchor="middle" font-size="14" fill="#6B6B7E">Continuity · Bottom-Up Learning · System-Level Emergence</text>

  <circle cx="600" cy="450" r="280" fill="url(#centerGlow)"/>

  <!-- Triangle vertices -->
  <!-- Top: Continuity -->
  <g filter="url(#sd)">
    <circle cx="600" cy="220" r="115" fill="url(#g1)" stroke="#880E4F" stroke-width="2"/>
    <text x="600" y="200" text-anchor="middle" font-size="20" font-weight="700" fill="#FFF">连续性</text>
    <text x="600" y="222" text-anchor="middle" font-size="13" fill="#FFF">Continuity</text>
    <text x="600" y="248" text-anchor="middle" font-size="11" fill="#FFE0EC">基质 · substrate</text>
    <text x="600" y="266" text-anchor="middle" font-size="11" fill="#FFE0EC">两次调用之间仍在演化</text>
  </g>

  <!-- Bottom-left: Bottom-Up Learning -->
  <g filter="url(#sd)">
    <circle cx="320" cy="600" r="115" fill="url(#g2)" stroke="#880E4F" stroke-width="2"/>
    <text x="320" y="582" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">自下而上学习</text>
    <text x="320" y="604" text-anchor="middle" font-size="13" fill="#FFF">Bottom-Up</text>
    <text x="320" y="630" text-anchor="middle" font-size="11" fill="#FFE0EC">机制 · mechanism</text>
    <text x="320" y="648" text-anchor="middle" font-size="11" fill="#FFE0EC">活着即学习 · STDP/Hebbian</text>
  </g>

  <!-- Bottom-right: Emergence -->
  <g filter="url(#sd)">
    <circle cx="880" cy="600" r="115" fill="url(#g3)" stroke="#880E4F" stroke-width="2"/>
    <text x="880" y="582" text-anchor="middle" font-size="20" font-weight="700" fill="#2D2D3E">系统涌现</text>
    <text x="880" y="604" text-anchor="middle" font-size="13" fill="#2D2D3E">Emergence</text>
    <text x="880" y="630" text-anchor="middle" font-size="11" fill="#3D3D4E">产物 · product</text>
    <text x="880" y="648" text-anchor="middle" font-size="11" fill="#3D3D4E">I(S) &gt; Σ I(sᵢ)</text>
  </g>

  <!-- Arrows on the triangle edges -->
  <g stroke="#2D2D3E" stroke-width="2.4" fill="none" marker-end="url(#ar)">
    <!-- Top -> Bottom-Left: enables -->
    <path d="M520 305 L405 530"/>
    <!-- Bottom-Left -> Bottom-Right: drives -->
    <path d="M440 615 L760 615"/>
    <!-- Bottom-Right -> Top: maintains -->
    <path d="M810 525 L680 305"/>
  </g>

  <!-- Edge labels -->
  <g font-size="13" fill="#2D2D3E" font-weight="600">
    <rect x="380" y="385" width="100" height="32" rx="6" fill="#FFFFFFCC" stroke="#E91E63"/>
    <text x="430" y="406" text-anchor="middle">使可能</text>

    <rect x="555" y="595" width="90" height="32" rx="6" fill="#FFFFFFCC" stroke="#E91E63"/>
    <text x="600" y="616" text-anchor="middle">驱动</text>

    <rect x="700" y="385" width="100" height="32" rx="6" fill="#FFFFFFCC" stroke="#E91E63"/>
    <text x="750" y="406" text-anchor="middle">回馈维护</text>
  </g>

  <!-- Center caption -->
  <g>
    <rect x="475" y="430" width="250" height="60" rx="10" fill="#FFF" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="600" y="453" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D3E">动态平衡的三角</text>
    <text x="600" y="475" text-anchor="middle" font-size="11" fill="#6B6B7E">三者互为前提与产物</text>
  </g>

  <!-- Lower formal expression -->
  <g>
    <rect x="200" y="730" width="800" height="50" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
    <text x="600" y="762" text-anchor="middle" font-size="14" font-style="italic" fill="#2D2D3E">连续性 (C1–C4) ⟹ 自下而上学习 (𝓛) ⟹ 系统涌现 (I(𝒮) &gt; Σᵢ I(sᵢ))</text>
  </g>
</svg>
