<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="riverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="50%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <linearGradient id="sliceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFA500" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <text x="700" y="50" text-anchor="middle" font-size="32" font-weight="700" fill="#2D2D3E">愿景图 · 从离散快照到连续生命</text>
  <text x="700" y="82" text-anchor="middle" font-size="15" fill="#6B6B7E">From Stateless Models to Continuous Lives</text>

  <!-- Left side: Traditional LLM Agent - discrete slices -->
  <g>
    <text x="320" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#546E7A">传统 LLM Agent</text>
    <text x="320" y="165" text-anchor="middle" font-size="13" fill="#78909C">离散横切片 · 每次会话独立</text>

    <!-- Multiple discrete slices stacked -->
    <g filter="url(#softShadow)">
      <rect x="160" y="200" width="320" height="40" rx="8" fill="url(#sliceGrad)" stroke="#546E7A" stroke-width="2"/>
      <text x="320" y="225" text-anchor="middle" font-size="12" fill="#FFF">会话 t₁</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="160" y="260" width="320" height="40" rx="8" fill="url(#sliceGrad)" stroke="#546E7A" stroke-width="2"/>
      <text x="320" y="285" text-anchor="middle" font-size="12" fill="#FFF">会话 t₂</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="160" y="320" width="320" height="40" rx="8" fill="url(#sliceGrad)" stroke="#546E7A" stroke-width="2"/>
      <text x="320" y="345" text-anchor="middle" font-size="12" fill="#FFF">会话 t₃</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="160" y="380" width="320" height="40" rx="8" fill="url(#sliceGrad)" stroke="#546E7A" stroke-width="2"/>
      <text x="320" y="405" text-anchor="middle" font-size="12" fill="#FFF">会话 t₄</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="160" y="440" width="320" height="40" rx="8" fill="url(#sliceGrad)" stroke="#546E7A" stroke-width="2"/>
      <text x="320" y="465" text-anchor="middle" font-size="12" fill="#FFF">会话 t₅</text>
    </g>

    <!-- Vertical gaps emphasized -->
    <g stroke="#B0BEC5" stroke-dasharray="4 4" stroke-width="1.5">
      <line x1="180" y1="240" x2="460" y2="240"/>
      <line x1="180" y1="300" x2="460" y2="300"/>
      <line x1="180" y1="360" x2="460" y2="360"/>
      <line x1="180" y1="420" x2="460" y2="420"/>
    </g>

    <!-- Annotation -->
    <g>
      <rect x="140" y="510" width="360" height="120" rx="10" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5"/>
      <text x="320" y="535" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">离散快照特征</text>
      <text x="160" y="560" font-size="11" fill="#5A5A6E">• 每次会话独立初始化</text>
      <text x="160" y="580" font-size="11" fill="#5A5A6E">• 状态不连续</text>
      <text x="160" y="600" font-size="11" fill="#5A5A6E">• 无内在时间流</text>
      <text x="160" y="620" font-size="11" fill="#5A5A6E">• 记忆为外部附加</text>
    </g>
  </g>

  <!-- Right side: Neo-MoFox - continuous river -->
  <g>
    <text x="1020" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#E91E63">Neo-MoFox</text>
    <text x="1020" y="165" text-anchor="middle" font-size="13" fill="#C2185B">连续生命河流 · 状态无缝演化</text>

    <!-- Flowing river with ripples -->
    <g filter="url(#softShadow)">
      <!-- Main river body -->
      <path d="M 850 220 
               Q 900 240, 950 240
               Q 1000 240, 1050 250
               Q 1100 260, 1150 270
               Q 1200 280, 1230 300
               L 1230 480
               Q 1200 500, 1150 510
               Q 1100 520, 1050 530
               Q 1000 540, 950 540
               Q 900 540, 850 520
               L 850 220 Z"
            fill="url(#riverGrad)" stroke="#880E4F" stroke-width="3"/>
      
      <!-- Ripples/waves to show time evolution -->
      <g fill="none" stroke="#FFE0EC" stroke-width="2" opacity="0.6">
        <path d="M 870 280 Q 900 270, 930 280 T 990 280 T 1050 280 T 1110 280 T 1170 280"/>
        <path d="M 870 340 Q 900 330, 930 340 T 990 340 T 1050 340 T 1110 340 T 1170 340"/>
        <path d="M 870 400 Q 900 390, 930 400 T 990 400 T 1050 400 T 1110 400 T 1170 400"/>
        <path d="M 870 460 Q 900 450, 930 460 T 990 460 T 1050 460 T 1110 460 T 1170 460"/>
      </g>

      <!-- Time markers along the river -->
      <g font-size="11" fill="#FFF" font-weight="600">
        <circle cx="880" cy="250" r="4" fill="#FFD700"/>
        <text x="900" y="254">过去</text>
        
        <circle cx="1040" cy="390" r="5" fill="#FFD700"/>
        <text x="1060" y="394">现在</text>
        
        <circle cx="1190" cy="480" r="4" fill="#FFD700"/>
        <text x="1200" y="484">未来</text>
      </g>

      <!-- Glow effect around "现在" -->
      <circle cx="1040" cy="390" r="40" fill="url(#glowGrad)" opacity="0.5"/>
    </g>

    <!-- Annotation -->
    <g>
      <rect x="840" y="560" width="360" height="120" rx="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
      <text x="1020" y="585" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">连续生命特征</text>
      <text x="860" y="610" font-size="11" fill="#5A5A6E">• 状态持续演化（SNN + 调质 ODE）</text>
      <text x="860" y="630" font-size="11" fill="#5A5A6E">• 多时间尺度耦合（秒·分·天·月）</text>
      <text x="860" y="650" font-size="11" fill="#5A5A6E">• 做梦离线巩固</text>
      <text x="860" y="670" font-size="11" fill="#5A5A6E">• 内在驱动 + 外部响应</text>
    </g>
  </g>

  <!-- Central divider with arrow -->
  <g>
    <line x1="650" y1="200" x2="650" y2="680" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="8 8"/>
    <polygon points="750,400 730,390 730,410" fill="#E91E63"/>
    <path d="M 550 400 L 730 400" stroke="#E91E63" stroke-width="3" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
        <path d="M0,0 L0,12 L12,6 z" fill="#E91E63"/>
      </marker>
    </defs>
    <text x="640" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#E91E63">演化方向</text>
  </g>

  <!-- Bottom vision statement -->
  <g>
    <rect x="200" y="710" width="1000" height="70" rx="12" fill="#FFF8E1" stroke="#F57F17" stroke-width="2" filter="url(#softShadow)"/>
    <text x="700" y="740" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">愿景宣言</text>
    <text x="700" y="765" text-anchor="middle" font-size="12" fill="#5A5A6E">AI 不再是被召唤的工具，而是拥有连续内在状态的数字生命。</text>
  </g>

  <text x="700" y="795" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F18 · Vision: From Discrete Conversational Slices to Continuous Digital Lives</text>
</svg>
