<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="dfcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0EC"/>
      <stop offset="100%" stop-color="#FFC0CB"/>
    </linearGradient>
    <linearGradient id="nucleusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowSync" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2D2D3E"/>
    </marker>
    <marker id="arrowAsync" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#E91E63"/>
    </marker>
    <marker id="arrowInject" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#6A1B9A"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <text x="700" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#2D2D3E">DFC ↔ Life Engine 双向接口设计</text>
  <text x="700" y="82" text-anchor="middle" font-size="14" fill="#6B6B7E">三条通信接口 · 同步/异步/注入 · 状态无缝流动</text>

  <!-- Left box: DFC -->
  <g filter="url(#softShadow)">
    <rect x="120" y="180" width="400" height="450" rx="20" fill="url(#dfcGrad)" stroke="#E91E63" stroke-width="3"/>
    <text x="320" y="225" text-anchor="middle" font-size="24" font-weight="700" fill="#2D2D3E">DFC</text>
    <text x="320" y="250" text-anchor="middle" font-size="13" fill="#5A5A6E">对话内核 · 被动响应</text>

    <!-- DFC components -->
    <rect x="160" y="280" width="320" height="80" rx="10" fill="#FFFFFF" stroke="#C2185B" stroke-width="1.5"/>
    <text x="320" y="310" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">LLM 推理引擎</text>
    <text x="320" y="330" text-anchor="middle" font-size="11" fill="#6B6B7E">流式生成 · 工具调用</text>
    <text x="320" y="348" text-anchor="middle" font-size="11" fill="#6B6B7E">结合 Nucleus 状态</text>

    <rect x="160" y="380" width="320" height="80" rx="10" fill="#FFFFFF" stroke="#C2185B" stroke-width="1.5"/>
    <text x="320" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">上下文管理</text>
    <text x="320" y="430" text-anchor="middle" font-size="11" fill="#6B6B7E">历史窗口 · 人格资产</text>
    <text x="320" y="448" text-anchor="middle" font-size="11" fill="#6B6B7E">动态压缩</text>

    <rect x="160" y="480" width="320" height="80" rx="10" fill="#FFFFFF" stroke="#C2185B" stroke-width="1.5"/>
    <text x="320" y="510" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">事件监听器</text>
    <text x="320" y="530" text-anchor="middle" font-size="11" fill="#6B6B7E">用户消息触发</text>
    <text x="320" y="548" text-anchor="middle" font-size="11" fill="#6B6B7E">Nucleus 唤醒通知</text>

    <text x="320" y="610" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">service/dfc.py</text>
  </g>

  <!-- Right box: Life Engine (Nucleus) -->
  <g filter="url(#softShadow)">
    <rect x="880" y="180" width="400" height="450" rx="20" fill="url(#nucleusGrad)" stroke="#880E4F" stroke-width="3"/>
    <text x="1080" y="225" text-anchor="middle" font-size="24" font-weight="700" fill="#FFF">Life Engine</text>
    <text x="1080" y="250" text-anchor="middle" font-size="13" fill="#FFE0EC">生命中枢 · 主动循环</text>

    <!-- Nucleus components -->
    <rect x="920" y="280" width="320" height="70" rx="10" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1.5"/>
    <text x="1080" y="310" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">SNN 驱动层</text>
    <text x="1080" y="330" text-anchor="middle" font-size="11" fill="#5A5A6E">8→16→6 LIF · 软STDP</text>

    <rect x="920" y="365" width="320" height="70" rx="10" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1.5"/>
    <text x="1080" y="395" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">调质 ODE 引擎</text>
    <text x="1080" y="415" text-anchor="middle" font-size="11" fill="#5A5A6E">5 调质 · 昼夜节律</text>

    <rect x="920" y="450" width="320" height="70" rx="10" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1.5"/>
    <text x="1080" y="480" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">记忆图 + 习惯</text>
    <text x="1080" y="500" text-anchor="middle" font-size="11" fill="#5A5A6E">节点边演化 · 衰减</text>

    <rect x="920" y="535" width="320" height="70" rx="10" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1.5"/>
    <text x="1080" y="565" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">心跳调度器</text>
    <text x="1080" y="585" text-anchor="middle" font-size="11" fill="#5A5A6E">30s 周期 · 事件派发</text>

    <text x="1080" y="610" text-anchor="middle" font-size="11" fill="#FFE0EC" font-style="italic">service/nucleus.py</text>
  </g>

  <!-- Interface 1: nucleus_wake_dfc (right to left, async) -->
  <g>
    <path d="M 880 310 L 520 310" fill="none" stroke="#E91E63" stroke-width="4" stroke-dasharray="10 5" marker-end="url(#arrowAsync)"/>
    <rect x="620" y="270" width="200" height="80" rx="10" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" filter="url(#softShadow)"/>
    <text x="720" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">nucleus_wake_dfc</text>
    <text x="720" y="315" text-anchor="middle" font-size="11" fill="#5A5A6E">异步队列唤醒</text>
    <text x="720" y="335" text-anchor="middle" font-size="10" fill="#9B9BAA">Life Engine → DFC</text>
  </g>

  <!-- Interface 2: consult_nucleus (left to right, sync) -->
  <g>
    <path d="M 520 410 L 880 410" fill="none" stroke="#2D2D3E" stroke-width="4" marker-end="url(#arrowSync)"/>
    <rect x="620" y="370" width="200" height="80" rx="10" fill="#E0F2F1" stroke="#00695C" stroke-width="2" filter="url(#softShadow)"/>
    <text x="720" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">consult_nucleus</text>
    <text x="720" y="415" text-anchor="middle" font-size="11" fill="#5A5A6E">同步拉取状态</text>
    <text x="720" y="435" text-anchor="middle" font-size="10" fill="#9B9BAA">DFC → Life Engine</text>
  </g>

  <!-- Interface 3: nucleus_tell_dfc / push_runtime_injection (right to left, inject) -->
  <g>
    <path d="M 880 520 L 520 520" fill="none" stroke="#6A1B9A" stroke-width="4" stroke-dasharray="15 3" marker-end="url(#arrowInject)"/>
    <rect x="620" y="480" width="200" height="80" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2" filter="url(#softShadow)"/>
    <text x="720" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">nucleus_tell_dfc</text>
    <text x="720" y="525" text-anchor="middle" font-size="11" fill="#5A5A6E">运行时注入</text>
    <text x="720" y="545" text-anchor="middle" font-size="10" fill="#9B9BAA">梦报告 / 调质摘要</text>
  </g>

  <!-- Bottom legend -->
  <g>
    <rect x="120" y="670" width="1160" height="110" rx="12" fill="#FFFFFF" stroke="#E91E63" stroke-width="2" filter="url(#softShadow)"/>
    <text x="700" y="700" text-anchor="middle" font-size="15" font-weight="700" fill="#2D2D3E">接口协议说明</text>
    <line x1="150" y1="710" x2="1250" y2="710" stroke="#E0E0E0"/>
    
    <g font-size="11" fill="#3D3D4E">
      <text x="160" y="735" font-weight="600">① nucleus_wake_dfc:</text>
      <text x="320" y="735">异步队列，Life Engine 主动唤醒 DFC（如：触发主动对话、梦报告投递）</text>
      
      <text x="160" y="755" font-weight="600">② consult_nucleus:</text>
      <text x="320" y="755">同步调用，DFC 在推理时拉取 Nucleus 状态（SNN drives + 调质浓度 + 习惯）</text>
      
      <text x="160" y="770" font-weight="600">③ nucleus_tell_dfc:</text>
      <text x="320" y="770">运行时注入，通过 push_runtime_assistant_injection 将梦报告/调质变化注入对话流</text>
    </g>
  </g>

  <text x="700" y="795" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F13 · DFC ↔ Nucleus Bidirectional Interface: Async Queue / Sync Pull / Runtime Injection</text>
</svg>
