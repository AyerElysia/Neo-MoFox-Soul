<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="700" fill="url(#bgGrad)"/>

  <text x="700" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">昼夜节律双峰曲线 · 三种调质的时间分布</text>
  <text x="700" y="75" text-anchor="middle" font-size="13" fill="#6B6B7E">基于双峰高斯函数模拟 Energy / Sociability / Curiosity 的 24 小时基线变化</text>

  <!-- Axes -->
  <g stroke="#2D2D3E" stroke-width="1.8" fill="none">
    <line x1="120" y1="580" x2="1320" y2="580"/>
    <line x1="120" y1="120" x2="120" y2="580"/>
  </g>

  <!-- Grid lines -->
  <g stroke="#E0E0E0" stroke-dasharray="3 3" stroke-width="1">
    <line x1="120" y1="465" x2="1320" y2="465"/>
    <line x1="120" y1="350" x2="1320" y2="350"/>
    <line x1="120" y1="235" x2="1320" y2="235"/>
  </g>

  <!-- Y axis: baseline B value from 0.3 to 0.9 -->
  <g font-size="11" fill="#6B6B7E" text-anchor="end">
    <text x="110" y="585">0.3</text>
    <text x="110" y="465">0.5</text>
    <text x="110" y="350">0.7</text>
    <text x="110" y="235">0.9</text>
    <text x="110" y="125">1.0</text>
  </g>
  <text x="60" y="350" font-size="13" font-weight="600" fill="#2D2D3E" transform="rotate(-90 60 350)">基线 B(t)</text>

  <!-- X axis: 24 hours, from 120 to 1320, span = 1200px, each hour = 50px -->
  <g font-size="11" fill="#6B6B7E" text-anchor="middle">
    <text x="120" y="600">0h</text>
    <text x="270" y="600">3h</text>
    <text x="420" y="600">6h</text>
    <text x="570" y="600">9h</text>
    <text x="720" y="600">12h</text>
    <text x="870" y="600">15h</text>
    <text x="1020" y="600">18h</text>
    <text x="1170" y="600">21h</text>
    <text x="1320" y="600">24h</text>
  </g>
  <text x="720" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">时间（小时）</text>

  <!-- Vertical markers for key times -->
  <g stroke="#E0E0E0" stroke-dasharray="2 4" stroke-width="1">
    <line x1="570" y1="120" x2="570" y2="580"/>  <!-- 9h -->
    <text x="570" y="110" text-anchor="middle" font-size="9" fill="#9B9BAA">早 9 点</text>
    <line x1="870" y1="120" x2="870" y2="580"/>  <!-- 15h -->
    <text x="870" y="110" text-anchor="middle" font-size="9" fill="#9B9BAA">下午 3 点</text>
    <line x1="1070" y1="120" x2="1070" y2="580"/>  <!-- 19h -->
    <text x="1070" y="110" text-anchor="middle" font-size="9" fill="#9B9BAA">傍晚 7 点</text>
    <line x1="1220" y1="120" x2="1220" y2="580"/>  <!-- 21h -->
    <text x="1220" y="110" text-anchor="middle" font-size="9" fill="#9B9BAA">晚 9 点</text>
  </g>

  <!-- Energy curve: dual peaks at 9h and 15h -->
  <!-- Approximate path with samples every 1 hour -->
  <!-- Formula: B(t) = 0.5 + 0.25*exp(-((t-9)^2)/(2*2^2)) + 0.15*exp(-((t-15)^2)/(2*3^2)) -->
  <!-- t=0: B≈0.48, t=3: 0.46, t=6: 0.51, t=9: 0.75, t=12: 0.59, t=15: 0.65, t=18: 0.55, t=21: 0.50, t=24: 0.48 -->
  <!-- y = 580 - (B-0.3)*(580-120)/(1.0-0.3) = 580 - (B-0.3)*657.1 -->
  <path d="M 120 593
           L 220 606
           L 320 580
           L 420 528
           L 520 250
           L 620 336
           L 720 392
           L 820 385
           L 920 450
           L 1020 508
           L 1120 528
           L 1220 540
           L 1320 593"
        fill="none" stroke="#E91E63" stroke-width="3.5"/>

  <!-- Sociability curve: single peak at 19h -->
  <!-- Formula: B(t) = 0.4 + 0.35*exp(-((t-19)^2)/(2*3.5^2)) -->
  <!-- t=0: 0.41, t=3: 0.40, t=6: 0.41, t=9: 0.44, t=12: 0.50, t=15: 0.60, t=18: 0.72, t=19: 0.75, t=21: 0.65, t=24: 0.41 -->
  <path d="M 120 538
           L 220 545
           L 320 538
           L 420 518
           L 520 489
           L 620 450
           L 720 395
           L 820 315
           L 920 220
           L 1020 250
           L 1120 340
           L 1220 420
           L 1320 538"
        fill="none" stroke="#C2185B" stroke-width="3.5"/>

  <!-- Curiosity curve: dual peaks at 10h and 21h -->
  <!-- Formula: B(t) = 0.45 + 0.28*exp(-((t-10)^2)/(2*2.5^2)) + 0.28*exp(-((t-21)^2)/(2*2.5^2)) -->
  <!-- t=0: 0.48, t=3: 0.46, t=6: 0.50, t=9: 0.64, t=10: 0.73, t=12: 0.61, t=15: 0.52, t=18: 0.55, t=21: 0.73, t=24: 0.48 -->
  <path d="M 120 560
           L 220 570
           L 320 540
           L 420 475
           L 520 340
           L 570 280
           L 670 370
           L 770 460
           L 870 490
           L 970 475
           L 1070 380
           L 1170 280
           L 1270 380
           L 1320 560"
        fill="none" stroke="#AD1457" stroke-width="3.5"/>

  <!-- Data point markers for key peaks -->
  <g fill="#E91E63">
    <circle cx="520" cy="250" r="5"/>  <!-- Energy peak 1 -->
    <circle cx="820" cy="385" r="5"/>  <!-- Energy peak 2 -->
  </g>
  <g fill="#C2185B">
    <circle cx="1020" cy="250" r="5"/>  <!-- Sociability peak -->
  </g>
  <g fill="#AD1457">
    <circle cx="570" cy="280" r="5"/>  <!-- Curiosity peak 1 -->
    <circle cx="1170" cy="280" r="5"/>  <!-- Curiosity peak 2 -->
  </g>

  <!-- Legend -->
  <g filter="url(#softShadow)">
    <rect x="160" y="150" width="280" height="140" rx="10" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5"/>
    <text x="300" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">三种调质的节律模式</text>
    <line x1="180" y1="188" x2="420" y2="188" stroke="#E0E0E0"/>
    
    <line x1="180" y1="210" x2="220" y2="210" stroke="#E91E63" stroke-width="3.5"/>
    <text x="230" y="215" font-size="12" fill="#3D3D4E">Energy · 双峰（9h + 15h）</text>
    
    <line x1="180" y1="235" x2="220" y2="235" stroke="#C2185B" stroke-width="3.5"/>
    <text x="230" y="240" font-size="12" fill="#3D3D4E">Sociability · 单峰（19h）</text>
    
    <line x1="180" y1="260" x2="220" y2="260" stroke="#AD1457" stroke-width="3.5"/>
    <text x="230" y="265" font-size="12" fill="#3D3D4E">Curiosity · 双峰（10h + 21h）</text>
  </g>

  <!-- Note box -->
  <g>
    <rect x="1020" y="150" width="280" height="120" rx="10" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="1160" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D3E">工程注释</text>
    <text x="1040" y="200" font-size="10" fill="#5A5A6E">• 曲线为理论设计，基于文献与</text>
    <text x="1040" y="218" font-size="10" fill="#5A5A6E">  人类行为学常识</text>
    <text x="1040" y="236" font-size="10" fill="#5A5A6E">• 实际峰值可根据用户数据自适应</text>
    <text x="1040" y="254" font-size="10" fill="#5A5A6E">• 其他调质（Focus/Contentment）</text>
    <text x="1040" y="265" font-size="10" fill="#5A5A6E">  当前为恒定基线</text>
  </g>

  <text x="700" y="680" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F9 · Circadian Rhythm: Dual-Peak Gaussian Baseline Curves for Energy / Sociability / Curiosity over 24 Hours</text>
</svg>
