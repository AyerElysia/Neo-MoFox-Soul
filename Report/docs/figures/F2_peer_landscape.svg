<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGrad">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">同行光谱图 · 连续性 × 学习方式二维分布</text>
  <text x="600" y="72" text-anchor="middle" font-size="13" fill="#6B6B7E">D1: 连续性程度（横轴） · D2: 学习方式（纵轴） · D3: 智能来源（气泡大小）</text>

  <!-- Axes -->
  <g stroke="#2D2D3E" stroke-width="1.8" fill="none">
    <line x1="140" y1="680" x2="1080" y2="680"/>
    <line x1="140" y1="140" x2="140" y2="680"/>
    <polygon points="1080,680 1070,676 1070,684" fill="#2D2D3E"/>
    <polygon points="140,140 136,150 144,150" fill="#2D2D3E"/>
  </g>

  <!-- Grid lines -->
  <g stroke="#E0E0E0" stroke-dasharray="3 3" stroke-width="1">
    <line x1="140" y1="550" x2="1080" y2="550"/>
    <line x1="140" y1="410" x2="1080" y2="410"/>
    <line x1="140" y1="270" x2="1080" y2="270"/>
    <line x1="375" y1="140" x2="375" y2="680"/>
    <line x1="610" y1="140" x2="610" y2="680"/>
    <line x1="845" y1="140" x2="845" y2="680"/>
  </g>

  <!-- Axis labels -->
  <text x="610" y="720" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">D1 · 连续性程度</text>
  <text x="610" y="740" text-anchor="middle" font-size="12" fill="#6B6B7E">离散会话触发 ←――――――――→ 持续 24/7 运行</text>
  
  <text x="60" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E" transform="rotate(-90 60 410)">D2 · 学习方式</text>
  <text x="90" y="410" text-anchor="middle" font-size="11" fill="#6B6B7E" transform="rotate(-90 90 410)">全量梯度学习 ←→ 本地无监督学习</text>

  <!-- X-axis ticks -->
  <g font-size="10" fill="#6B6B7E" text-anchor="middle">
    <text x="140" y="698">0</text>
    <text x="375" y="698">3</text>
    <text x="610" y="698">5</text>
    <text x="845" y="698">7</text>
    <text x="1080" y="698">10</text>
  </g>

  <!-- Y-axis ticks -->
  <g font-size="10" fill="#6B6B7E" text-anchor="end">
    <text x="130" y="685">0</text>
    <text x="130" y="550">3</text>
    <text x="130" y="410">5</text>
    <text x="130" y="270">7</text>
    <text x="130" y="145">10</text>
  </g>

  <!-- Data points - positioned based on (continuity, learning) -->
  <!-- Replika: low continuity (2), low learning (1), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="234" cy="632" r="20" fill="#FFC0CB" stroke="#E91E63" stroke-width="1.5" opacity="0.85"/>
    <text x="234" y="638" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">Replika</text>
  </g>

  <!-- Character.AI: low continuity (2.5), low learning (1.5), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="258" cy="603" r="22" fill="#FFB6C1" stroke="#E91E63" stroke-width="1.5" opacity="0.85"/>
    <text x="258" y="609" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">Char.AI</text>
  </g>

  <!-- Soul Machines: low continuity (2), medium learning (3), small size -->
  <g filter="url(#softShadow)">
    <circle cx="234" cy="550" r="16" fill="#E1BEE7" stroke="#8E24AA" stroke-width="1.5" opacity="0.85"/>
    <text x="234" y="555" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">Soul</text>
  </g>

  <!-- ChatGPT: low continuity (1), very low learning (0.5), large size -->
  <g filter="url(#softShadow)">
    <circle cx="187" cy="656" r="26" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1.5" opacity="0.85"/>
    <text x="187" y="662" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">ChatGPT</text>
  </g>

  <!-- MemGPT: medium continuity (4), low learning (2), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="422" cy="598" r="20" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5" opacity="0.85"/>
    <text x="422" y="604" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">MemGPT</text>
  </g>

  <!-- Generative Agents: medium continuity (5), low learning (2.5), large size -->
  <g filter="url(#softShadow)">
    <circle cx="610" cy="575" r="25" fill="#B2DFDB" stroke="#00796B" stroke-width="1.5" opacity="0.85"/>
    <text x="610" y="581" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">Gen Agents</text>
  </g>

  <!-- Voyager: medium continuity (5), medium-high learning (6), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="610" cy="350" r="21" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5" opacity="0.85"/>
    <text x="610" y="356" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">Voyager</text>
  </g>

  <!-- SOAR: high continuity (8), high learning (8), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="892" cy="240" r="20" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5" opacity="0.85"/>
    <text x="892" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">SOAR</text>
  </g>

  <!-- ACT-R: high continuity (7), high learning (7.5), small size -->
  <g filter="url(#softShadow)">
    <circle cx="798" cy="263" r="18" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" opacity="0.85"/>
    <text x="798" y="269" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">ACT-R</text>
  </g>

  <!-- LIDA: high continuity (8.5), high learning (8), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="939" cy="240" r="19" fill="#FFCCBC" stroke="#D84315" stroke-width="1.5" opacity="0.85"/>
    <text x="939" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">LIDA</text>
  </g>

  <!-- DreamerV3: high continuity (9), medium-high learning (6.5), medium size -->
  <g filter="url(#softShadow)">
    <circle cx="986" cy="322" r="21" fill="#D1C4E9" stroke="#512DA8" stroke-width="1.5" opacity="0.85"/>
    <text x="986" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">Dreamer</text>
  </g>

  <!-- AutoGPT: medium continuity (4.5), low learning (1.5), small size -->
  <g filter="url(#softShadow)">
    <circle cx="469" cy="603" r="17" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5" opacity="0.85"/>
    <text x="469" y="608" text-anchor="middle" font-size="9" font-weight="600" fill="#2D2D3E">Auto</text>
  </g>

  <!-- BrainTransformers: low continuity (2), high learning (7), small size -->
  <g filter="url(#softShadow)">
    <circle cx="234" cy="277" r="17" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5" opacity="0.85"/>
    <text x="234" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#2D2D3E">BrainTF</text>
  </g>

  <!-- Loihi 2: very high continuity (9.5), very high learning (9), small size (hardware) -->
  <g filter="url(#softShadow)">
    <circle cx="1033" cy="210" r="16" fill="#B0BEC5" stroke="#455A64" stroke-width="1.5" opacity="0.85"/>
    <text x="1033" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#2D2D3E">Loihi</text>
  </g>

  <!-- Neo-MoFox: top-right - high continuity (9), high learning (8.5), LARGEST and HIGHLIGHTED with STAR -->
  <g filter="url(#softShadow)">
    <circle cx="986" cy="223" r="35" fill="url(#starGrad)" stroke="#E91E63" stroke-width="3" opacity="0.95"/>
    <text x="986" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#880E4F">Neo-MoFox</text>
    <text x="986" y="235" text-anchor="middle" font-size="8" fill="#6B6B7E">★ 本工作 ★</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="880" y="480" width="280" height="180" rx="10" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="1020" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">图例 · Legend</text>
    <line x1="900" y1="515" x2="1140" y2="515" stroke="#E0E0E0"/>
    
    <circle cx="910" cy="538" r="10" fill="#FFC0CB" stroke="#E91E63" stroke-width="1.5"/>
    <text x="930" y="543" font-size="11" fill="#3D3D4E">商业数字伴侣</text>
    
    <circle cx="910" cy="563" r="10" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5"/>
    <text x="930" y="568" font-size="11" fill="#3D3D4E">LLM Agent</text>
    
    <circle cx="910" cy="588" r="10" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5"/>
    <text x="930" y="593" font-size="11" fill="#3D3D4E">经典认知架构</text>
    
    <circle cx="910" cy="613" r="10" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5"/>
    <text x="930" y="618" font-size="11" fill="#3D3D4E">SNN/神经形态</text>

    <text x="900" y="643" font-size="10" fill="#6B6B7E">气泡大小 ∝ 智能来源复杂度</text>
  </g>

  <text x="600" y="775" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F2 · Peer Landscape: Continuity × Learning Paradigm with Neo-MoFox Highlighted</text>
</svg>
