<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="evt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE0EC"/><stop offset="100%" stop-color="#FFC0CB"/></linearGradient>
    <linearGradient id="snn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8BBD0"/><stop offset="100%" stop-color="#E91E63"/></linearGradient>
    <linearGradient id="mod" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFB6C1"/><stop offset="100%" stop-color="#C2185B"/></linearGradient>
    <linearGradient id="mem" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#AD1457"/></linearGradient>
    <linearGradient id="llm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE0EC"/><stop offset="100%" stop-color="#880E4F"/></linearGradient>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#2D2D3E"/></marker>
    <marker id="arrR" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#E91E63"/></marker>
    <filter id="sh"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1400" height="900" fill="#FAFAFA"/>
  <text x="700" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">心跳一轮 · 数据流时序</text>
  <text x="700" y="78" text-anchor="middle" font-size="14" fill="#6B6B7E">Event → Feature → SNN → Drives → Modulators → Prompt → LLM → Feedback</text>

  <!-- Vertical lanes -->
  <g font-size="13" fill="#6B6B7E" text-anchor="middle">
    <line x1="180" y1="120" x2="180" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="370" y1="120" x2="370" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="560" y1="120" x2="560" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="750" y1="120" x2="750" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="940" y1="120" x2="940" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="1130" y1="120" x2="1130" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <line x1="1320" y1="120" x2="1320" y2="800" stroke="#E0E0E0" stroke-dasharray="3 3"/>
    <text x="180" y="115" font-weight="700" fill="#2D2D3E">EventBus</text>
    <text x="370" y="115" font-weight="700" fill="#2D2D3E">Feature</text>
    <text x="560" y="115" font-weight="700" fill="#2D2D3E">SNN</text>
    <text x="750" y="115" font-weight="700" fill="#2D2D3E">Neuromod</text>
    <text x="940" y="115" font-weight="700" fill="#2D2D3E">Memory</text>
    <text x="1130" y="115" font-weight="700" fill="#2D2D3E">Prompt</text>
    <text x="1320" y="115" font-weight="700" fill="#2D2D3E">LLM/Tools</text>
  </g>

  <!-- Step boxes -->
  <g filter="url(#sh)" font-size="12" fill="#2D2D3E">
    <g>
      <rect x="120" y="160" width="120" height="60" rx="8" fill="url(#evt)" stroke="#C2185B"/>
      <text x="180" y="186" text-anchor="middle" font-weight="700">① 拉事件</text>
      <text x="180" y="206" text-anchor="middle" font-size="10" fill="#3D3D4E">用户/工具/超时</text>
    </g>
    <g>
      <rect x="310" y="240" width="120" height="60" rx="8" fill="url(#evt)" stroke="#C2185B"/>
      <text x="370" y="266" text-anchor="middle" font-weight="700">② 8 维特征</text>
      <text x="370" y="286" text-anchor="middle" font-size="10" fill="#3D3D4E">FeatureExtractor</text>
    </g>
    <g>
      <rect x="500" y="320" width="120" height="60" rx="8" fill="url(#snn)" stroke="#880E4F"/>
      <text x="560" y="346" text-anchor="middle" font-weight="700" fill="#FFF">③ SNN tick</text>
      <text x="560" y="366" text-anchor="middle" font-size="10" fill="#FFE0EC">10 步 LIF + 软STDP</text>
    </g>
    <g>
      <rect x="500" y="395" width="120" height="60" rx="8" fill="url(#snn)" stroke="#880E4F"/>
      <text x="560" y="421" text-anchor="middle" font-weight="700" fill="#FFF">④ 6 维 drive</text>
      <text x="560" y="441" text-anchor="middle" font-size="10" fill="#FFE0EC">EMA 平滑</text>
    </g>
    <g>
      <rect x="690" y="475" width="120" height="60" rx="8" fill="url(#mod)" stroke="#880E4F"/>
      <text x="750" y="501" text-anchor="middle" font-weight="700" fill="#FFF">⑤ 5 维刺激</text>
      <text x="750" y="521" text-anchor="middle" font-size="10" fill="#FFE0EC">drive→stim 映射</text>
    </g>
    <g>
      <rect x="690" y="550" width="120" height="60" rx="8" fill="url(#mod)" stroke="#880E4F"/>
      <text x="750" y="576" text-anchor="middle" font-weight="700" fill="#FFF">⑥ ODE 步进</text>
      <text x="750" y="596" text-anchor="middle" font-size="10" fill="#FFE0EC">5 调质 + 昼夜</text>
    </g>
    <g>
      <rect x="880" y="630" width="120" height="60" rx="8" fill="url(#mem)" stroke="#880E4F"/>
      <text x="940" y="656" text-anchor="middle" font-weight="700" fill="#FFF">⑦ 检索</text>
      <text x="940" y="676" text-anchor="middle" font-size="10" fill="#FFE0EC">BM25+Vec+RRF</text>
    </g>
    <g>
      <rect x="1070" y="700" width="120" height="60" rx="8" fill="url(#llm)" stroke="#880E4F"/>
      <text x="1130" y="726" text-anchor="middle" font-weight="700" fill="#FFF">⑧ 拼装</text>
      <text x="1130" y="746" text-anchor="middle" font-size="10" fill="#FFE0EC">人格+状态+记忆</text>
    </g>
    <g>
      <rect x="1260" y="770" width="120" height="55" rx="8" fill="url(#llm)" stroke="#880E4F"/>
      <text x="1320" y="794" text-anchor="middle" font-weight="700" fill="#FFF">⑨ LLM 推理</text>
      <text x="1320" y="812" text-anchor="middle" font-size="10" fill="#FFE0EC">流式输出</text>
    </g>
  </g>

  <!-- Arrows -->
  <g stroke="#2D2D3E" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M240 190 L310 260"/>
    <path d="M430 270 L500 340"/>
    <path d="M560 380 L560 395"/>
    <path d="M620 425 L690 495"/>
    <path d="M750 535 L750 550"/>
    <path d="M810 580 L880 650"/>
    <path d="M1000 660 L1070 720"/>
    <path d="M1190 730 L1260 790"/>
  </g>

  <!-- Feedback loop -->
  <g stroke="#E91E63" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrR)">
    <path d="M1320 825 Q 700 870, 180 220"/>
  </g>
  <g>
    <rect x="500" y="820" width="380" height="34" rx="6" fill="#FFFFFFCC" stroke="#E91E63"/>
    <text x="690" y="843" text-anchor="middle" font-size="12" font-weight="700" fill="#E91E63">⑩ 反馈：响应/工具结果回写为新事件 → 下一轮心跳</text>
  </g>

  <!-- Side annotations: timing -->
  <g font-size="11" fill="#6B6B7E">
    <text x="50" y="260" font-weight="600" fill="#E91E63">10s SNN tick</text>
    <text x="50" y="278">三步可叠加</text>
    <text x="50" y="510" font-weight="600" fill="#C2185B">30s 心跳</text>
    <text x="50" y="528">完成⑤–⑩</text>
    <text x="50" y="780" font-weight="600" fill="#880E4F">仅在</text>
    <text x="50" y="798">⑧⑨上调用</text>
    <text x="50" y="816">外部 LLM</text>
  </g>

  <text x="700" y="887" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F5 · End-to-End Heartbeat Data Flow Timing (single round)</text>
</svg>
