<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <radialGradient id="neuronIn" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#FFE0EC"/></radialGradient>
    <radialGradient id="neuronH" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFB6C1"/><stop offset="100%" stop-color="#E91E63"/></radialGradient>
    <radialGradient id="neuronO" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#F8BBD0"/><stop offset="100%" stop-color="#AD1457"/></radialGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter>
  </defs>
  <rect width="1400" height="900" fill="#FAFAFA"/>
  <text x="700" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">SNN 微观结构 · 8 → 16 → 6</text>
  <text x="700" y="76" text-anchor="middle" font-size="14" fill="#6B6B7E">输入特征 → 隐藏 LIF 层 → 6 维 Drive 输出</text>

  <!-- Layer labels -->
  <text x="200" y="125" font-size="16" font-weight="700" fill="#E91E63">输入层 · 8 维</text>
  <text x="700" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#E91E63">隐藏层 · 16 LIF 神经元</text>
  <text x="1200" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#E91E63">输出层 · 6 维 Drive</text>

  <!-- Input neurons (8) -->
  <g>
    <g><circle cx="200" cy="180" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="184" font-size="12" fill="#2D2D3E">x₁ chat_freq</text></g>
    <g><circle cx="200" cy="240" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="244" font-size="12" fill="#2D2D3E">x₂ silence_dur</text></g>
    <g><circle cx="200" cy="300" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="304" font-size="12" fill="#2D2D3E">x₃ valence</text></g>
    <g><circle cx="200" cy="360" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="364" font-size="12" fill="#2D2D3E">x₄ arousal</text></g>
    <g><circle cx="200" cy="420" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="424" font-size="12" fill="#2D2D3E">x₅ topic_novelty</text></g>
    <g><circle cx="200" cy="480" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="484" font-size="12" fill="#2D2D3E">x₆ tool_use</text></g>
    <g><circle cx="200" cy="540" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="544" font-size="12" fill="#2D2D3E">x₇ time_of_day</text></g>
    <g><circle cx="200" cy="600" r="22" fill="url(#neuronIn)" stroke="#E91E63" stroke-width="1.8"/><text x="245" y="604" font-size="12" fill="#2D2D3E">x₈ habit_due</text></g>
  </g>

  <!-- Hidden neurons (16, 4x4 grid roughly) -->
  <g>
    <!-- column 1 -->
    <g id="hcol1">
      <circle cx="600" cy="180" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="600" cy="280" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="600" cy="380" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="600" cy="480" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="600" cy="580" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="600" cy="680" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
    </g>
    <g>
      <circle cx="700" cy="220" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="700" cy="320" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="700" cy="420" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="700" cy="520" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="700" cy="620" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
    </g>
    <g>
      <circle cx="800" cy="260" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="800" cy="360" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="800" cy="460" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="800" cy="560" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
      <circle cx="800" cy="660" r="20" fill="url(#neuronH)" stroke="#880E4F"/>
    </g>
  </g>

  <!-- Output neurons (6) -->
  <g>
    <g><circle cx="1200" cy="200" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="204" font-size="13" font-weight="600" fill="#2D2D3E">arousal</text></g>
    <g><circle cx="1200" cy="280" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="284" font-size="13" font-weight="600" fill="#2D2D3E">valence</text></g>
    <g><circle cx="1200" cy="360" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="364" font-size="13" font-weight="600" fill="#2D2D3E">social</text></g>
    <g><circle cx="1200" cy="440" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="444" font-size="13" font-weight="600" fill="#2D2D3E">task</text></g>
    <g><circle cx="1200" cy="520" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="524" font-size="13" font-weight="600" fill="#2D2D3E">exploration</text></g>
    <g><circle cx="1200" cy="600" r="24" fill="url(#neuronO)" stroke="#3D003D" stroke-width="2"/><text x="1240" y="604" font-size="13" font-weight="600" fill="#2D2D3E">rest</text></g>
  </g>

  <!-- Connections (sparse selection for visual clarity) -->
  <g stroke="#FFB6C1" stroke-width="0.6" opacity="0.45" fill="none">
    <!-- input to hidden -->
    <line x1="222" y1="180" x2="580" y2="180"/><line x1="222" y1="180" x2="580" y2="280"/><line x1="222" y1="180" x2="580" y2="480"/>
    <line x1="222" y1="240" x2="580" y2="180"/><line x1="222" y1="240" x2="580" y2="380"/><line x1="222" y1="240" x2="580" y2="580"/>
    <line x1="222" y1="300" x2="580" y2="280"/><line x1="222" y1="300" x2="580" y2="480"/>
    <line x1="222" y1="360" x2="580" y2="380"/><line x1="222" y1="360" x2="580" y2="580"/>
    <line x1="222" y1="420" x2="580" y2="380"/><line x1="222" y1="420" x2="580" y2="480"/>
    <line x1="222" y1="480" x2="580" y2="180"/><line x1="222" y1="480" x2="580" y2="380"/>
    <line x1="222" y1="540" x2="580" y2="580"/><line x1="222" y1="540" x2="580" y2="680"/>
    <line x1="222" y1="600" x2="580" y2="380"/><line x1="222" y1="600" x2="580" y2="680"/>
    <!-- hidden internal -->
    <line x1="620" y1="280" x2="680" y2="220"/><line x1="620" y1="380" x2="680" y2="320"/><line x1="620" y1="480" x2="680" y2="420"/><line x1="620" y1="580" x2="680" y2="520"/><line x1="620" y1="680" x2="680" y2="620"/>
    <line x1="720" y1="220" x2="780" y2="260"/><line x1="720" y1="320" x2="780" y2="360"/><line x1="720" y1="420" x2="780" y2="460"/><line x1="720" y1="520" x2="780" y2="560"/><line x1="720" y1="620" x2="780" y2="660"/>
    <!-- hidden to output -->
    <line x1="820" y1="260" x2="1176" y2="200"/><line x1="820" y1="260" x2="1176" y2="280"/>
    <line x1="820" y1="360" x2="1176" y2="280"/><line x1="820" y1="360" x2="1176" y2="360"/>
    <line x1="820" y1="460" x2="1176" y2="360"/><line x1="820" y1="460" x2="1176" y2="440"/>
    <line x1="820" y1="560" x2="1176" y2="440"/><line x1="820" y1="560" x2="1176" y2="520"/>
    <line x1="820" y1="660" x2="1176" y2="520"/><line x1="820" y1="660" x2="1176" y2="600"/>
  </g>

  <!-- LIF formula -->
  <g>
    <rect x="500" y="740" width="400" height="80" rx="10" fill="#FFF" stroke="#E91E63"/>
    <text x="700" y="765" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D3E">LIF 神经元动力学</text>
    <text x="700" y="792" text-anchor="middle" font-size="14" fill="#2D2D3E">dV/dt = -(V - V_rest)/τ + I/τ</text>
    <text x="700" y="812" text-anchor="middle" font-size="11" fill="#6B6B7E">软 STDP · 自稳态阈值 · 动态增益</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#6B6B7E">
    <circle cx="60" cy="780" r="8" fill="url(#neuronIn)" stroke="#E91E63"/><text x="78" y="784">输入特征 (来自事件流)</text>
    <circle cx="60" cy="800" r="8" fill="url(#neuronH)" stroke="#880E4F"/><text x="78" y="804">隐藏层 LIF (软 STDP 可塑)</text>
    <circle cx="60" cy="820" r="8" fill="url(#neuronO)" stroke="#3D003D"/><text x="78" y="824">输出 6 维 drive (EMA 平滑)</text>
  </g>

  <text x="700" y="880" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F6 · SNN Microarchitecture (8 inputs → 16 hidden LIF → 6 drive outputs)</text>
</svg>
