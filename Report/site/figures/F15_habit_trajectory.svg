<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <text x="600" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">习惯形成轨迹 · 30 天连续打卡演化</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#6B6B7E">streak 阶梯增长 + strength 平滑曲线 · 第 7 天阈值跨越 · 第 21 天强度饱和</text>

  <!-- Axes -->
  <g stroke="#2D2D3E" stroke-width="1.8" fill="none">
    <line x1="120" y1="580" x2="1080" y2="580"/>
    <line x1="120" y1="120" x2="120" y2="580"/>
    <polygon points="1080,580 1070,576 1070,584" fill="#2D2D3E"/>
    <polygon points="120,120 116,130 124,130" fill="#2D2D3E"/>
  </g>

  <!-- Grid lines -->
  <g stroke="#E0E0E0" stroke-dasharray="3 3" stroke-width="1">
    <line x1="120" y1="465" x2="1080" y2="465"/>
    <line x1="120" y1="350" x2="1080" y2="350"/>
    <line x1="120" y1="235" x2="1080" y2="235"/>
  </g>

  <!-- Axis labels -->
  <text x="600" y="620" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">天数（Day）</text>
  <text x="60" y="350" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E" transform="rotate(-90 60 350)">数值</text>

  <!-- X-axis ticks: Day 1-30 -->
  <g font-size="10" fill="#6B6B7E" text-anchor="middle">
    <text x="120" y="600">1</text>
    <text x="216" y="600">4</text>
    <text x="312" y="600">7</text>
    <text x="408" y="600">10</text>
    <text x="504" y="600">13</text>
    <text x="600" y="600">16</text>
    <text x="696" y="600">19</text>
    <text x="792" y="600">22</text>
    <text x="888" y="600">25</text>
    <text x="984" y="600">28</text>
    <text x="1080" y="600">30</text>
  </g>

  <!-- Y-axis ticks: 0 to 30 for streak, 0 to 1.0 for strength -->
  <g font-size="10" fill="#6B6B7E" text-anchor="end">
    <text x="110" y="585">0</text>
    <text x="110" y="465">10</text>
    <text x="110" y="350">20</text>
    <text x="110" y="235">30</text>
    <text x="110" y="125">1.0</text>
  </g>

  <!-- Streak curve: step-like growth from 0 to 30 -->
  <!-- Each day, streak += 1, y = 580 - (streak * (580-120)/30) -->
  <path d="M 120 580
           L 152 567 L 184 554 L 216 541 L 248 528 L 280 515 L 312 502
           L 344 489 L 376 476 L 408 463 L 440 450 L 472 437 L 504 424
           L 536 411 L 568 398 L 600 385 L 632 372 L 664 359 L 696 346
           L 728 333 L 760 320 L 792 307 L 824 294 L 856 281 L 888 268
           L 920 255 L 952 242 L 984 229 L 1016 216 L 1048 203 L 1080 190"
        fill="none" stroke="#E91E63" stroke-width="3.5"/>

  <!-- Strength curve: smooth sigmoid-like growth -->
  <!-- Formula: strength = 0.6 * (streak/30) + 0.4 * (recency_factor) -->
  <!-- Approximate with smooth curve rising from 0 to ~0.85 and plateauing -->
  <path d="M 120 580
           Q 200 560, 280 520
           Q 360 470, 440 410
           Q 520 340, 600 290
           Q 680 250, 760 220
           Q 840 200, 920 190
           Q 1000 185, 1080 183"
        fill="none" stroke="#C2185B" stroke-width="3.5"/>

  <!-- Key event markers -->
  <!-- Day 7: threshold crossing -->
  <g>
    <line x1="312" y1="120" x2="312" y2="580" stroke="#AD1457" stroke-dasharray="5 5" stroke-width="1.5"/>
    <rect x="280" y="130" width="64" height="40" rx="6" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="312" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">Day 7</text>
    <text x="312" y="162" text-anchor="middle" font-size="9" fill="#6B6B7E">阈值跨越</text>
  </g>

  <!-- Day 21: strength plateau -->
  <g>
    <line x1="792" y1="120" x2="792" y2="580" stroke="#880E4F" stroke-dasharray="5 5" stroke-width="1.5"/>
    <rect x="760" y="130" width="64" height="40" rx="6" fill="#FFE0EC" stroke="#C2185B" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="792" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#2D2D3E">Day 21</text>
    <text x="792" y="162" text-anchor="middle" font-size="9" fill="#6B6B7E">强度饱和</text>
  </g>

  <!-- Data point markers -->
  <g fill="#E91E63">
    <circle cx="312" cy="502" r="5"/>  <!-- streak at day 7 -->
    <circle cx="792" cy="307" r="5"/>  <!-- streak at day 22 -->
  </g>
  <g fill="#C2185B">
    <circle cx="312" cy="470" r="5"/>  <!-- strength at day 7 -->
    <circle cx="792" cy="220" r="5"/>  <!-- strength at day 22 -->
  </g>

  <!-- Annotations -->
  <g>
    <text x="320" y="495" font-size="9" fill="#E91E63">streak ≈ 7</text>
    <text x="320" y="463" font-size="9" fill="#C2185B">strength ≈ 0.4</text>
  </g>
  <g>
    <text x="800" y="300" font-size="9" fill="#E91E63">streak ≈ 22</text>
    <text x="800" y="213" font-size="9" fill="#C2185B">strength ≈ 0.8</text>
  </g>

  <!-- Legend -->
  <g filter="url(#softShadow)">
    <rect x="850" y="360" width="200" height="120" rx="10" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5"/>
    <text x="950" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">曲线图例</text>
    <line x1="870" y1="395" x2="1030" y2="395" stroke="#E0E0E0"/>
    
    <line x1="870" y1="415" x2="900" y2="415" stroke="#E91E63" stroke-width="3"/>
    <text x="910" y="420" font-size="11" fill="#3D3D4E">streak（阶梯）</text>
    
    <line x1="870" y1="440" x2="900" y2="440" stroke="#C2185B" stroke-width="3"/>
    <text x="910" y="445" font-size="11" fill="#3D3D4E">strength（平滑）</text>
    
    <text x="950" y="470" text-anchor="middle" font-size="9" fill="#9B9BAA">strength = 0.6·(s/30) + 0.4·r</text>
  </g>

  <!-- Explanation box -->
  <g>
    <rect x="120" y="620" width="960" height="60" rx="10" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
    <text x="600" y="645" text-anchor="middle" font-size="12" font-weight="600" fill="#2D2D3E">习惯形成机制</text>
    <text x="600" y="665" text-anchor="middle" font-size="10" fill="#5A5A6E">连续打卡 30 天，streak 线性增长；strength 曲线受 recency 调制，第 7 天形成"弱习惯"，第 21 天强度饱和至 0.8+，影响后续调质基线。</text>
  </g>

  <text x="600" y="693" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F15 · Habit Formation Trajectory: Streak Linear Growth and Strength Sigmoid Curve over 30 Days</text>
</svg>
