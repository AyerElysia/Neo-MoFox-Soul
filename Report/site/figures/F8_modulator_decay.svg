<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <rect width="1200" height="700" fill="#FAFAFA"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#2D2D3E">调质浓度衰减曲线 · 不同 τ 的回归动力学</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#6B6B7E">dM/dt = (B − M)/τ + stim · h(M),  无外部刺激下指数回归到基线 B</text>

  <!-- Axes -->
  <g stroke="#2D2D3E" stroke-width="1.5" fill="none">
    <line x1="120" y1="580" x2="1140" y2="580"/>
    <line x1="120" y1="100" x2="120" y2="580"/>
  </g>
  <!-- Y axis labels: 0, 0.25, 0.5, 0.75, 1.0 -->
  <g font-size="11" fill="#6B6B7E">
    <text x="105" y="585" text-anchor="end">0</text>
    <text x="105" y="465" text-anchor="end">0.25</text>
    <text x="105" y="345" text-anchor="end">0.50</text>
    <text x="105" y="225" text-anchor="end">0.75</text>
    <text x="105" y="105" text-anchor="end">1.00</text>
  </g>
  <!-- horizontal grid -->
  <g stroke="#E0E0E0" stroke-dasharray="3 3">
    <line x1="120" y1="465" x2="1140" y2="465"/>
    <line x1="120" y1="345" x2="1140" y2="345"/>
    <line x1="120" y1="225" x2="1140" y2="225"/>
    <line x1="120" y1="105" x2="1140" y2="105"/>
  </g>
  <!-- baseline B=0.5 -->
  <line x1="120" y1="345" x2="1140" y2="345" stroke="#9B9BAA" stroke-width="1.2" stroke-dasharray="2 4"/>
  <text x="1145" y="349" font-size="11" fill="#9B9BAA">基线 B = 0.5</text>

  <!-- X axis: 0 to 6 hours mapped to 120..1140 (=1020px). Each hour = 170px -->
  <g font-size="11" fill="#6B6B7E">
    <text x="120" y="600" text-anchor="middle">0</text>
    <text x="290" y="600" text-anchor="middle">1h</text>
    <text x="460" y="600" text-anchor="middle">2h</text>
    <text x="630" y="600" text-anchor="middle">3h</text>
    <text x="800" y="600" text-anchor="middle">4h</text>
    <text x="970" y="600" text-anchor="middle">5h</text>
    <text x="1140" y="600" text-anchor="middle">6h</text>
    <text x="630" y="625" text-anchor="middle" font-size="12" font-weight="600" fill="#2D2D3E">时间（小时） · 从初始浓度 M₀ = 1.0 衰减回基线 B = 0.5</text>
  </g>

  <!-- Curves: M(t) = B + (M0 - B) * exp(-t/τ); M0=1.0, B=0.5 -->
  <!-- Hours mapping: t in seconds, x = 120 + (t/3600)*170. y = 105 + (1 - M)*480 (since y range 105..585 = 480 for M from 1.0..0.0)
       Actually we want y for M: M=1.0 -> y=105; M=0 -> y=585. So y = 105 + (1-M)*480.
       Simpler: y = 585 - M*480.
  -->
  <!-- Pre-computed curves with τ ∈ {1800s=0.5h, 3600s=1h, 5400s=1.5h, 10800s=3h} -->
  <!-- We sample at t=0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 5, 6 hours -->

  <!-- τ=1800s (0.5h) - curiosity -->
  <path d="M 120 105
           L 205 222
           L 290 282
           L 375 314
           L 460 332
           L 545 341
           L 630 343
           L 715 344
           L 800 345
           L 970 345
           L 1140 345" fill="none" stroke="#E91E63" stroke-width="2.4"/>

  <!-- τ=3600s (1h) - sociability -->
  <path d="M 120 105
           L 205 178
           L 290 222
           L 375 263
           L 460 282
           L 545 305
           L 630 316
           L 715 326
           L 800 332
           L 970 340
           L 1140 343" fill="none" stroke="#C2185B" stroke-width="2.4"/>

  <!-- τ=5400s (1.5h) - focus/contentment -->
  <path d="M 120 105
           L 205 158
           L 290 199
           L 375 232
           L 460 258
           L 545 279
           L 630 296
           L 715 309
           L 800 319
           L 970 333
           L 1140 339" fill="none" stroke="#AD1457" stroke-width="2.4"/>

  <!-- τ=10800s (3h) - energy -->
  <path d="M 120 105
           L 205 137
           L 290 165
           L 375 191
           L 460 215
           L 545 235
           L 630 254
           L 715 270
           L 800 285
           L 970 309
           L 1140 326" fill="none" stroke="#880E4F" stroke-width="2.4"/>

  <!-- Endpoint dots -->
  <g>
    <circle cx="120" cy="105" r="4" fill="#2D2D3E"/>
    <text x="125" y="98" font-size="10" fill="#2D2D3E">M₀ = 1.0</text>
  </g>

  <!-- Legend -->
  <g font-size="12" fill="#2D2D3E">
    <rect x="850" y="120" width="280" height="160" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
    <text x="990" y="142" text-anchor="middle" font-weight="700">五大调质 · 时间常数</text>
    <line x1="870" y1="160" x2="900" y2="160" stroke="#E91E63" stroke-width="2.4"/><text x="908" y="164">curiosity (τ ≈ 1800s)</text>
    <line x1="870" y1="184" x2="900" y2="184" stroke="#C2185B" stroke-width="2.4"/><text x="908" y="188">sociability (τ ≈ 3600s)</text>
    <line x1="870" y1="208" x2="900" y2="208" stroke="#AD1457" stroke-width="2.4"/><text x="908" y="212">focus / contentment (τ ≈ 5400s)</text>
    <line x1="870" y1="232" x2="900" y2="232" stroke="#880E4F" stroke-width="2.4"/><text x="908" y="236">energy (τ ≈ 10800s)</text>
    <text x="870" y="262" font-size="10" fill="#6B6B7E">τ 越大 → 回归越缓 → 时间惯性越强</text>
  </g>

  <text x="60" y="340" font-size="12" fill="#2D2D3E" transform="rotate(-90 60 340)">浓度 M(t)</text>
  <text x="600" y="680" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F8 · Modulator Decay Curves under Distinct Time Constants τ</text>
</svg>
