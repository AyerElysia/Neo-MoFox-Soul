<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGrad">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">设计空间散点图 · 连续性 × 学习本地化</text>
  <text x="600" y="72" text-anchor="middle" font-size="13" fill="#6B6B7E">X 轴：连续性程度（0-10） · Y 轴：学习+涌现的本地化程度（0-10） · Neo-MoFox 星形高亮</text>

  <!-- Axes -->
  <g stroke="#2D2D3E" stroke-width="2" fill="none">
    <line x1="120" y1="680" x2="1080" y2="680"/>
    <line x1="120" y1="140" x2="120" y2="680"/>
    <polygon points="1080,680 1070,676 1070,684" fill="#2D2D3E"/>
    <polygon points="120,140 116,150 124,150" fill="#2D2D3E"/>
  </g>

  <!-- Grid lines -->
  <g stroke="#E0E0E0" stroke-dasharray="3 3" stroke-width="1">
    <line x1="120" y1="545" x2="1080" y2="545"/>
    <line x1="120" y1="410" x2="1080" y2="410"/>
    <line x1="120" y1="275" x2="1080" y2="275"/>
    <line x1="360" y1="140" x2="360" y2="680"/>
    <line x1="600" y1="140" x2="600" y2="680"/>
    <line x1="840" y1="140" x2="840" y2="680"/>
  </g>

  <!-- Axis labels -->
  <text x="600" y="720" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">连续性程度 · Continuity</text>
  <text x="600" y="740" text-anchor="middle" font-size="11" fill="#6B6B7E">离散会话 ←―――――――――――→ 持续生命</text>
  
  <text x="60" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E" transform="rotate(-90 60 410)">学习+涌现本地化</text>
  <text x="90" y="410" text-anchor="middle" font-size="10" fill="#6B6B7E" transform="rotate(-90 90 410)">全量集中训练 ←→ 在线本地涌现</text>

  <!-- Tick labels -->
  <g font-size="10" fill="#6B6B7E" text-anchor="middle">
    <text x="120" y="698">0</text>
    <text x="360" y="698">2.5</text>
    <text x="600" y="698">5</text>
    <text x="840" y="698">7.5</text>
    <text x="1080" y="698">10</text>
  </g>
  <g font-size="10" fill="#6B6B7E" text-anchor="end">
    <text x="110" y="685">0</text>
    <text x="110" y="545">2.5</text>
    <text x="110" y="410">5</text>
    <text x="110" y="275">7.5</text>
    <text x="110" y="145">10</text>
  </g>

  <!-- Scatter points -->
  <!-- ChatGPT: (1, 0.5) -->
  <g filter="url(#softShadow)">
    <circle cx="216" cy="653" r="16" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1.5" opacity="0.85"/>
    <text x="216" y="658" text-anchor="middle" font-size="9" fill="#2D2D3E">ChatGPT</text>
  </g>

  <!-- Replika: (2, 1) -->
  <g filter="url(#softShadow)">
    <circle cx="312" cy="626" r="15" fill="#FFC0CB" stroke="#E91E63" stroke-width="1.5" opacity="0.85"/>
    <text x="312" y="631" text-anchor="middle" font-size="8" fill="#2D2D3E">Replika</text>
  </g>

  <!-- Character.AI: (2.5, 1.5) -->
  <g filter="url(#softShadow)">
    <circle cx="360" cy="599" r="15" fill="#FFB6C1" stroke="#E91E63" stroke-width="1.5" opacity="0.85"/>
    <text x="360" y="604" text-anchor="middle" font-size="8" fill="#2D2D3E">Char.AI</text>
  </g>

  <!-- Soul Machines: (2, 2.5) -->
  <g filter="url(#softShadow)">
    <circle cx="312" cy="545" r="14" fill="#E1BEE7" stroke="#8E24AA" stroke-width="1.5" opacity="0.85"/>
    <text x="312" y="550" text-anchor="middle" font-size="8" fill="#2D2D3E">Soul</text>
  </g>

  <!-- MemGPT: (4, 2) -->
  <g filter="url(#softShadow)">
    <circle cx="504" cy="572" r="15" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5" opacity="0.85"/>
    <text x="504" y="577" text-anchor="middle" font-size="8" fill="#2D2D3E">MemGPT</text>
  </g>

  <!-- AutoGPT: (4.5, 1.5) -->
  <g filter="url(#softShadow)">
    <circle cx="552" cy="599" r="14" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5" opacity="0.85"/>
    <text x="552" y="604" text-anchor="middle" font-size="8" fill="#2D2D3E">Auto</text>
  </g>

  <!-- Generative Agents: (5, 2.5) -->
  <g filter="url(#softShadow)">
    <circle cx="600" cy="545" r="17" fill="#B2DFDB" stroke="#00796B" stroke-width="1.5" opacity="0.85"/>
    <text x="600" y="550" text-anchor="middle" font-size="9" fill="#2D2D3E">GenAgents</text>
  </g>

  <!-- Voyager: (5, 5.5) -->
  <g filter="url(#softShadow)">
    <circle cx="600" cy="383" r="16" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5" opacity="0.85"/>
    <text x="600" y="388" text-anchor="middle" font-size="8" fill="#2D2D3E">Voyager</text>
  </g>

  <!-- ACT-R: (7, 7) -->
  <g filter="url(#softShadow)">
    <circle cx="792" cy="302" r="15" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" opacity="0.85"/>
    <text x="792" y="307" text-anchor="middle" font-size="8" fill="#2D2D3E">ACT-R</text>
  </g>

  <!-- SOAR: (8, 7.5) -->
  <g filter="url(#softShadow)">
    <circle cx="888" cy="275" r="15" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5" opacity="0.85"/>
    <text x="888" y="280" text-anchor="middle" font-size="8" fill="#2D2D3E">SOAR</text>
  </g>

  <!-- LIDA: (8.5, 7.5) -->
  <g filter="url(#softShadow)">
    <circle cx="936" cy="275" r="14" fill="#FFCCBC" stroke="#D84315" stroke-width="1.5" opacity="0.85"/>
    <text x="936" y="280" text-anchor="middle" font-size="8" fill="#2D2D3E">LIDA</text>
  </g>

  <!-- DreamerV3: (9, 6) -->
  <g filter="url(#softShadow)">
    <circle cx="984" cy="356" r="16" fill="#D1C4E9" stroke="#512DA8" stroke-width="1.5" opacity="0.85"/>
    <text x="984" y="361" text-anchor="middle" font-size="8" fill="#2D2D3E">Dreamer</text>
  </g>

  <!-- BrainTransformers: (2, 6.5) -->
  <g filter="url(#softShadow)">
    <circle cx="312" cy="329" r="14" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5" opacity="0.85"/>
    <text x="312" y="334" text-anchor="middle" font-size="7" fill="#2D2D3E">BrainTF</text>
  </g>

  <!-- Loihi 2: (9.5, 8.5) -->
  <g filter="url(#softShadow)">
    <circle cx="1032" cy="221" r="14" fill="#B0BEC5" stroke="#455A64" stroke-width="1.5" opacity="0.85"/>
    <text x="1032" y="226" text-anchor="middle" font-size="7" fill="#2D2D3E">Loihi</text>
  </g>

  <!-- Neo-MoFox: (9, 8) - STAR HIGHLIGHT -->
  <g filter="url(#softShadow)">
    <!-- Star shape using polygon -->
    <polygon points="984,221 991,238 1009,238 995,249 1001,266 984,255 967,266 973,249 959,238 977,238"
             fill="url(#starGrad)" stroke="#E91E63" stroke-width="3" opacity="0.95"/>
    <circle cx="984" cy="248" r="28" fill="url(#starGrad)" stroke="#E91E63" stroke-width="3" opacity="0.95"/>
    <text x="984" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#880E4F">Neo-MoFox</text>
    <text x="984" y="258" text-anchor="middle" font-size="8" fill="#6B6B7E">★ 本工作 ★</text>
  </g>

  <!-- Quadrant labels (subtle background) -->
  <g font-size="12" font-style="italic" fill="#E0E0E0" opacity="0.6">
    <text x="280" y="200">传统会话型</text>
    <text x="900" y="200">自主涌现型</text>
    <text x="280" y="630">静态人设型</text>
    <text x="900" y="630">任务执行型</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="850" y="460" width="300" height="200" rx="10" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="1000" y="485" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">设计空间说明</text>
    <line x1="870" y1="495" x2="1130" y2="495" stroke="#E0E0E0"/>
    
    <text x="880" y="515" font-size="10" fill="#3D3D4E">• X 轴：系统是否持续运行</text>
    <text x="880" y="535" font-size="10" fill="#3D3D4E">• Y 轴：学习是否在本地发生</text>
    <text x="880" y="555" font-size="10" fill="#3D3D4E">  （无需全量反向传播）</text>
    <text x="880" y="580" font-size="10" fill="#6B6B7E">理想系统：右上角</text>
    <text x="880" y="600" font-size="10" fill="#6B6B7E">• 持续运行 + 在线学习</text>
    <text x="880" y="620" font-size="10" fill="#6B6B7E">• Neo-MoFox 为目前唯一完整</text>
    <text x="880" y="638" font-size="10" fill="#6B6B7E">  实现"SNN + LLM + 调质 ODE"</text>
    <text x="880" y="655" font-size="10" fill="#6B6B7E">  的数字伴侣框架</text>
  </g>

  <text x="600" y="775" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F17 · Design Space Scatter Plot: Continuity × Learning Localization with Neo-MoFox Highlighted</text>
</svg>
