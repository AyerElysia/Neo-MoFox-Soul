<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <text x="600" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#2D2D3E">STDP 学习曲线对比 · 经典 vs 软 STDP</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#6B6B7E">左：经典指数 STDP 时间窗 · 右：Neo-MoFox 基于 sigmoid 膜电位的软 STDP</text>

  <!-- Left panel: Classic STDP -->
  <g>
    <text x="300" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D3E">经典 STDP</text>
    <text x="300" y="132" text-anchor="middle" font-size="11" fill="#6B6B7E">指数时间窗 · Δw = A · exp(-|Δt|/τ)</text>

    <!-- Axes -->
    <g stroke="#2D2D3E" stroke-width="1.5" fill="none">
      <line x1="100" y1="400" x2="500" y2="400"/>
      <line x1="300" y1="180" x2="300" y2="580"/>
      <polygon points="500,400 490,396 490,404" fill="#2D2D3E"/>
      <polygon points="300,180 296,190 304,190" fill="#2D2D3E"/>
    </g>

    <!-- Grid -->
    <g stroke="#E0E0E0" stroke-dasharray="2 2" stroke-width="1">
      <line x1="100" y1="290" x2="500" y2="290"/>
      <line x1="100" y1="510" x2="500" y2="510"/>
      <line x1="200" y1="180" x2="200" y2="580"/>
      <line x1="400" y1="180" x2="400" y2="580"/>
    </g>

    <!-- Labels -->
    <text x="520" y="405" font-size="11" fill="#2D2D3E">Δt (ms)</text>
    <text x="260" y="170" font-size="11" fill="#2D2D3E">Δw</text>

    <!-- Tick labels -->
    <g font-size="10" fill="#6B6B7E" text-anchor="middle">
      <text x="200" y="615">-50</text>
      <text x="300" y="615">0</text>
      <text x="400" y="615">50</text>
    </g>
    <g font-size="10" fill="#6B6B7E" text-anchor="end">
      <text x="90" y="295">0.5</text>
      <text x="90" y="405">0</text>
      <text x="90" y="515">-0.5</text>
    </g>

    <!-- STDP curve: potentiation (Δt>0) and depression (Δt<0) -->
    <!-- Pre-before-post (Δt>0): LTP, exponential decay from 0 to +50ms -->
    <path d="M 300 290
             Q 320 295, 340 310
             Q 360 330, 380 355
             Q 390 370, 400 385"
          fill="none" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Post-before-pre (Δt<0): LTD, exponential decay from 0 to -50ms -->
    <path d="M 300 510
             Q 280 505, 260 490
             Q 240 470, 220 445
             Q 210 430, 200 415"
          fill="none" stroke="#F44336" stroke-width="3"/>

    <!-- Zero line marker -->
    <circle cx="300" cy="400" r="4" fill="#2D2D3E"/>

    <!-- Legend -->
    <g>
      <line x1="130" y1="550" x2="160" y2="550" stroke="#4CAF50" stroke-width="2.5"/>
      <text x="170" y="555" font-size="10" fill="#3D3D4E">LTP (增强)</text>
      <line x1="280" y1="550" x2="310" y2="550" stroke="#F44336" stroke-width="2.5"/>
      <text x="320" y="555" font-size="10" fill="#3D3D4E">LTD (抑制)</text>
    </g>

    <!-- Annotations -->
    <text x="350" y="270" font-size="9" fill="#388E3C">pre → post</text>
    <text x="230" y="530" font-size="9" fill="#C62828">post → pre</text>
  </g>

  <!-- Right panel: Soft STDP -->
  <g>
    <text x="900" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#E91E63">软 STDP (Neo-MoFox)</text>
    <text x="900" y="132" text-anchor="middle" font-size="11" fill="#6B6B7E">基于 sigmoid(u) 的平滑调制 · 避免硬阈值</text>

    <!-- Axes -->
    <g stroke="#2D2D3E" stroke-width="1.5" fill="none">
      <line x1="700" y1="400" x2="1100" y2="400"/>
      <line x1="900" y1="180" x2="900" y2="580"/>
      <polygon points="1100,400 1090,396 1090,404" fill="#2D2D3E"/>
      <polygon points="900,180 896,190 904,190" fill="#2D2D3E"/>
    </g>

    <!-- Grid -->
    <g stroke="#E0E0E0" stroke-dasharray="2 2" stroke-width="1">
      <line x1="700" y1="290" x2="1100" y2="290"/>
      <line x1="700" y1="510" x2="1100" y2="510"/>
      <line x1="800" y1="180" x2="800" y2="580"/>
      <line x1="1000" y1="180" x2="1000" y2="580"/>
    </g>

    <!-- Labels -->
    <text x="1120" y="405" font-size="11" fill="#2D2D3E">Δt (ms)</text>
    <text x="860" y="170" font-size="11" fill="#2D2D3E">Δw</text>

    <!-- Tick labels -->
    <g font-size="10" fill="#6B6B7E" text-anchor="middle">
      <text x="800" y="615">-50</text>
      <text x="900" y="615">0</text>
      <text x="1000" y="615">50</text>
    </g>
    <g font-size="10" fill="#6B6B7E" text-anchor="end">
      <text x="690" y="295">0.5</text>
      <text x="690" y="405">0</text>
      <text x="690" y="515">-0.5</text>
    </g>

    <!-- Soft STDP curve: smoother, modulated by sigmoid -->
    <!-- Δt>0: softer LTP with gradual rise -->
    <path d="M 900 340
             Q 920 335, 940 325
             Q 960 315, 980 305
             Q 990 300, 1000 298"
          fill="none" stroke="#E91E63" stroke-width="3"/>
    
    <!-- Δt<0: softer LTD with gradual decline -->
    <path d="M 900 460
             Q 880 465, 860 475
             Q 840 485, 820 495
             Q 810 500, 800 502"
          fill="none" stroke="#AD1457" stroke-width="3"/>

    <!-- Zero crossing -->
    <circle cx="900" cy="400" r="4" fill="#2D2D3E"/>

    <!-- Legend -->
    <g>
      <line x1="730" y1="550" x2="760" y2="550" stroke="#E91E63" stroke-width="2.5"/>
      <text x="770" y="555" font-size="10" fill="#3D3D4E">软 LTP</text>
      <line x1="880" y1="550" x2="910" y2="550" stroke="#AD1457" stroke-width="2.5"/>
      <text x="920" y="555" font-size="10" fill="#3D3D4E">软 LTD</text>
    </g>

    <!-- Annotations -->
    <g font-size="9" fill="#C2185B">
      <text x="950" y="280">基于 u_post</text>
      <text x="950" y="295">平滑调制</text>
    </g>
    <g font-size="9" fill="#880E4F">
      <text x="830" y="525">避免硬阈值</text>
      <text x="830" y="540">生物合理性</text>
    </g>
  </g>

  <!-- Bottom comparison note -->
  <g>
    <rect x="100" y="620" width="1000" height="60" rx="10" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
    <text x="600" y="645" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">关键差异：经典 STDP 依赖精确脉冲时序；软 STDP 通过 sigmoid(u) 调制，允许亚阈值积分影响学习</text>
    <text x="600" y="665" text-anchor="middle" font-size="11" fill="#6B6B7E">Neo-MoFox 的软 STDP 使得非发放神经元也能累积微弱学习信号，更接近生物突触可塑性的连续性质。</text>
  </g>

  <text x="600" y="693" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F7 · STDP Learning Curves: Classic Exponential Window vs. Neo-MoFox Soft STDP with Sigmoid Modulation</text>
</svg>
