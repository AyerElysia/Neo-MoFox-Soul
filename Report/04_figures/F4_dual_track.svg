<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="dfcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0EC"/>
      <stop offset="100%" stop-color="#FFC0CB"/>
    </linearGradient>
    <linearGradient id="lifeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowSync" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2D2D3E"/>
    </marker>
    <marker id="arrowAsync" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#E91E63"/>
    </marker>
    <marker id="arrowInject" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#880E4F"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)"/>

  <text x="700" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#2D2D3E">DFC + Life Engine 双轨架构</text>
  <text x="700" y="80" text-anchor="middle" font-size="14" fill="#6B6B7E">左轨被动响应 · 右轨主动循环 · 三条接口双向通信</text>

  <!-- Left Track: DFC (Passive) -->
  <g filter="url(#softShadow)">
    <rect x="80" y="160" width="480" height="600" rx="20" fill="url(#dfcGrad)" stroke="#E91E63" stroke-width="2.5"/>
    <text x="320" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#2D2D3E">DFC 轨道</text>
    <text x="320" y="235" text-anchor="middle" font-size="14" fill="#5A5A6E">被动响应 · 事件触发 · 无内在周期</text>
    
    <!-- DFC components -->
    <rect x="120" y="270" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#C2185B" stroke-width="2"/>
    <text x="300" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">① 用户消息到达</text>
    <text x="300" y="330" text-anchor="middle" font-size="12" fill="#6B6B7E">event_type: USER_MESSAGE</text>
    <text x="300" y="348" text-anchor="middle" font-size="12" fill="#6B6B7E">触发 DFC 从沉睡中唤醒</text>

    <rect x="120" y="380" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#C2185B" stroke-width="2"/>
    <text x="300" y="415" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">② 拉取 Nucleus 状态</text>
    <text x="300" y="440" text-anchor="middle" font-size="12" fill="#6B6B7E">调用 consult_nucleus()</text>
    <text x="300" y="458" text-anchor="middle" font-size="12" fill="#6B6B7E">获取 SNN drives + 调质浓度</text>

    <rect x="120" y="490" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#C2185B" stroke-width="2"/>
    <text x="300" y="525" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">③ LLM 推理生成</text>
    <text x="300" y="550" text-anchor="middle" font-size="12" fill="#6B6B7E">结合 Nucleus 状态生成回复</text>
    <text x="300" y="568" text-anchor="middle" font-size="12" fill="#6B6B7E">流式输出 + 工具调用</text>

    <rect x="120" y="600" width="360" height="120" rx="12" fill="#FFFFFF" stroke="#C2185B" stroke-width="2"/>
    <text x="300" y="635" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">④ 响应完成后休眠</text>
    <text x="300" y="660" text-anchor="middle" font-size="12" fill="#6B6B7E">等待下一个用户事件</text>
    <text x="300" y="678" text-anchor="middle" font-size="12" fill="#6B6B7E">无主动循环，完全被动</text>
    <text x="300" y="702" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">（同步 await 接口）</text>
  </g>

  <!-- Right Track: Life Engine (Active) -->
  <g filter="url(#softShadow)">
    <rect x="840" y="160" width="480" height="600" rx="20" fill="url(#lifeGrad)" stroke="#880E4F" stroke-width="2.5"/>
    <text x="1080" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF">Life Engine 轨道</text>
    <text x="1080" y="235" text-anchor="middle" font-size="14" fill="#FFE0EC">主动循环 · 独立心跳 · 30s 周期</text>
    
    <!-- Life Engine components -->
    <rect x="880" y="270" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="2"/>
    <text x="1060" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">① 心跳定时器</text>
    <text x="1060" y="330" text-anchor="middle" font-size="12" fill="#5A5A6E">每 30 秒自动触发</text>
    <text x="1060" y="348" text-anchor="middle" font-size="12" fill="#5A5A6E">不依赖用户输入</text>

    <rect x="880" y="380" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="2"/>
    <text x="1060" y="415" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">② SNN tick (10s 一次)</text>
    <text x="1060" y="440" text-anchor="middle" font-size="12" fill="#5A5A6E">LIF 神经元积分发放</text>
    <text x="1060" y="458" text-anchor="middle" font-size="12" fill="#5A5A6E">软 STDP 在线学习</text>

    <rect x="880" y="490" width="360" height="90" rx="12" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="2"/>
    <text x="1060" y="525" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">③ 调质 ODE 演化</text>
    <text x="1060" y="550" text-anchor="middle" font-size="12" fill="#5A5A6E">dM/dt = (B-M)/τ + stim·h(M)</text>
    <text x="1060" y="568" text-anchor="middle" font-size="12" fill="#5A5A6E">昼夜节律 + 衰减动力学</text>

    <rect x="880" y="600" width="360" height="120" rx="12" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="2"/>
    <text x="1060" y="635" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2D3E">④ 记忆图演化 + 习惯</text>
    <text x="1060" y="660" text-anchor="middle" font-size="12" fill="#5A5A6E">Ebbinghaus 衰减 · 强度更新</text>
    <text x="1060" y="678" text-anchor="middle" font-size="12" fill="#5A5A6E">可能唤醒 DFC 或触发做梦</text>
    <text x="1060" y="702" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">（异步队列接口）</text>
  </g>

  <!-- Three interfaces in the middle -->
  <g>
    <!-- Interface 1: nucleus_wake_dfc (async queue) -->
    <path d="M 880 320 L 560 320" fill="none" stroke="#E91E63" stroke-width="3" stroke-dasharray="8 5" marker-end="url(#arrowAsync)"/>
    <rect x="660" y="300" width="180" height="50" rx="8" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
    <text x="750" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2D3E">nucleus_wake_dfc</text>
    <text x="750" y="341" text-anchor="middle" font-size="10" fill="#6B6B7E">异步队列唤醒</text>

    <!-- Interface 2: consult_nucleus (sync pull) -->
    <path d="M 560 425 L 880 425" fill="none" stroke="#2D2D3E" stroke-width="3" marker-end="url(#arrowSync)"/>
    <rect x="660" y="405" width="180" height="50" rx="8" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>
    <text x="750" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2D3E">consult_nucleus</text>
    <text x="750" y="446" text-anchor="middle" font-size="10" fill="#6B6B7E">同步拉取状态</text>

    <!-- Interface 3: nucleus_tell_dfc (runtime injection) -->
    <path d="M 880 540 L 560 540" fill="none" stroke="#880E4F" stroke-width="3" stroke-dasharray="12 3" marker-end="url(#arrowInject)"/>
    <rect x="660" y="520" width="180" height="50" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
    <text x="750" y="543" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2D3E">nucleus_tell_dfc</text>
    <text x="750" y="561" text-anchor="middle" font-size="10" fill="#6B6B7E">运行时注入</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="200" y="800" width="1000" height="80" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="700" y="830" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">关键设计决策：两轨解耦但状态共享</text>
    <text x="700" y="850" text-anchor="middle" font-size="11" fill="#5A5A6E">DFC 轨被动响应用户，不产生内在状态；Life Engine 轨主动维持内在生命，可选择性唤醒 DFC。</text>
    <text x="700" y="868" text-anchor="middle" font-size="11" fill="#5A5A6E">状态通过三条接口双向流动：异步队列（唤醒）、同步拉取（查询）、运行时注入（梦报告/调质摘要）。</text>
  </g>

  <text x="700" y="890" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F4 · Dual-Track Execution: DFC Passive Response vs. Life Engine Active Heartbeat</text>
</svg>
