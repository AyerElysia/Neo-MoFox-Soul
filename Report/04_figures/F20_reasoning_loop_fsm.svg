<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="shadow20" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000033"/>
    </filter>
    <marker id="a20" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
    <marker id="a20r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
    <marker id="a20g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="a20o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="a20p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6A1B9A"/>
    </marker>
  </defs>

  <rect width="920" height="620" fill="url(#bg20)" rx="12"/>
  <rect x="1" y="1" width="918" height="618" fill="none" stroke="#E0E0E0" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="460" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#212121">Figure F20 · 多轮推理循环状态机（Enhanced 模式）</text>
  <text x="460" y="57" text-anchor="middle" font-size="12" fill="#757575">Multi-Round Reasoning Loop — Finite State Machine (Enhanced Mode)</text>
  <line x1="60" y1="66" x2="860" y2="66" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ===== STATE: INIT ===== -->
  <ellipse cx="460" cy="130" rx="95" ry="42" fill="#1565C0" filter="url(#shadow20)"/>
  <text x="460" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="white">INIT</text>
  <text x="460" y="142" text-anchor="middle" font-size="10" fill="#BBDEFB">组装 System + User Prompt</text>
  <text x="460" y="155" text-anchor="middle" font-size="9" fill="#BBDEFB">拉取 Nucleus 状态 / 构建工具列表</text>

  <!-- INIT → TOOL_CALLING -->
  <line x1="460" y1="172" x2="460" y2="228" stroke="#546E7A" stroke-width="2.5" marker-end="url(#a20)"/>
  <text x="480" y="204" text-anchor="start" font-size="10" fill="#546E7A">发送 LLM 请求</text>

  <!-- ===== STATE: TOOL_CALLING (center) ===== -->
  <rect x="305" y="230" width="310" height="120" rx="16" fill="#4A148C" filter="url(#shadow20)"/>
  <text x="460" y="257" text-anchor="middle" font-size="14" font-weight="700" fill="white">TOOL_CALLING</text>
  <text x="460" y="277" text-anchor="middle" font-size="10" fill="#E1BEE7">解析 LLM 响应中的 ToolCall 列表</text>
  <text x="460" y="293" text-anchor="middle" font-size="10" fill="#E1BEE7">实例化组件 → 并行 / 顺序执行</text>
  <text x="460" y="309" text-anchor="middle" font-size="10" fill="#E1BEE7">写回 TOOL_RESULT → 继续下一轮推理</text>
  <text x="460" y="327" text-anchor="middle" font-size="9" fill="#CE93D8">（Watchdog 喂狗；跨轮去重；顺序写回）</text>

  <!-- Self loop (continue reasoning) -->
  <path d="M 615 270 Q 710 240 710 290 Q 710 340 615 315" stroke="#6A1B9A" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#a20p)"/>
  <text x="718" y="272" text-anchor="start" font-size="9" fill="#6A1B9A">has_pending_</text>
  <text x="718" y="284" text-anchor="start" font-size="9" fill="#6A1B9A">tool_results</text>
  <text x="718" y="297" text-anchor="start" font-size="9" fill="#6A1B9A">→ 继续推理</text>

  <!-- ===== Three control flow exits ===== -->
  <!-- Exit 1: pass → WAIT -->
  <line x1="305" y1="260" x2="200" y2="260" stroke="#C62828" stroke-width="2" marker-end="url(#a20r)"/>
  <text x="247" y="254" text-anchor="middle" font-size="9.5" fill="#C62828">pass()</text>

  <rect x="55" y="228" width="140" height="90" rx="12" fill="#C62828" filter="url(#shadow20)"/>
  <text x="125" y="253" text-anchor="middle" font-size="13" font-weight="700" fill="white">WAIT</text>
  <text x="125" y="272" text-anchor="middle" font-size="9" fill="#FFCDD2">等待用户新消息</text>
  <text x="125" y="288" text-anchor="middle" font-size="9" fill="#FFCDD2">LLM 主动声明</text>
  <text x="125" y="303" text-anchor="middle" font-size="9" fill="#FFCDD2">"本轮我无话可说"</text>

  <!-- Exit 2: stop → STOP -->
  <line x1="305" y1="310" x2="200" y2="390" stroke="#E65100" stroke-width="2" marker-end="url(#a20o)"/>
  <text x="237" y="360" text-anchor="middle" font-size="9.5" fill="#E65100">stop(minutes=N)</text>

  <rect x="55" y="385" width="140" height="90" rx="12" fill="#E65100" filter="url(#shadow20)"/>
  <text x="125" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="white">STOP</text>
  <text x="125" y="429" text-anchor="middle" font-size="9" fill="#FFE0B2">挂起 N 分钟</text>
  <text x="125" y="445" text-anchor="middle" font-size="9" fill="#FFE0B2">Life Engine 继续心跳</text>
  <text x="125" y="461" text-anchor="middle" font-size="9" fill="#FFE0B2">定时器到期后恢复</text>

  <!-- Exit 3: no tool calls → DONE -->
  <line x1="460" y1="350" x2="460" y2="430" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#a20g)"/>
  <text x="482" y="396" text-anchor="start" font-size="9.5" fill="#2E7D32">无 tool calls</text>
  <text x="482" y="408" text-anchor="start" font-size="9.5" fill="#2E7D32">→ 直接回复文本</text>

  <ellipse cx="460" cy="470" rx="95" ry="38" fill="#2E7D32" filter="url(#shadow20)"/>
  <text x="460" y="464" text-anchor="middle" font-size="14" font-weight="700" fill="white">DONE</text>
  <text x="460" y="481" text-anchor="middle" font-size="10" fill="#C8E6C9">流式回写用户 / 等待下一消息</text>

  <!-- ===== Action-only special case ===== -->
  <rect x="630" y="395" width="240" height="85" rx="10" fill="white" stroke="#FF8F00" stroke-width="1.5" filter="url(#shadow20)"/>
  <rect x="630" y="395" width="240" height="26" rx="10" fill="#FFF8E1"/>
  <rect x="630" y="409" width="240" height="12" fill="#FFF8E1"/>
  <text x="750" y="412" text-anchor="middle" font-size="10.5" font-weight="700" fill="#E65100">Action-Only 边界情况</text>
  <text x="750" y="432" text-anchor="middle" font-size="9" fill="#E65100">全部调用都是 action-*</text>
  <text x="750" y="447" text-anchor="middle" font-size="9" fill="#E65100">→ 注入 __SUSPEND__ 占位符</text>
  <text x="750" y="462" text-anchor="middle" font-size="9" fill="#E65100">→ 防止 LLM 上下文空洞</text>
  <line x1="615" y1="350" x2="650" y2="398" stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a20o)"/>

  <!-- ===== Control flow legend ===== -->
  <rect x="55" y="500" width="810" height="90" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow20)"/>
  <text x="460" y="519" text-anchor="middle" font-size="11" font-weight="700" fill="#424242">控制流原语说明</text>

  <!-- Legend items -->
  <rect x="75" y="530" width="12" height="12" rx="2" fill="#C62828"/>
  <text x="95" y="541" font-size="9.5" fill="#424242">pass()：LLM 判断本轮无主动发言需求，进入 WAIT 等待用户新消息</text>

  <rect x="75" y="550" width="12" height="12" rx="2" fill="#E65100"/>
  <text x="95" y="561" font-size="9.5" fill="#424242">stop(minutes)：对话结束，N 分钟内不响应，Life Engine 心跳仍运行；适合 LLM 判断对话已自然结束</text>

  <rect x="75" y="570" width="12" height="12" rx="2" fill="#2E7D32"/>
  <text x="95" y="581" font-size="9.5" fill="#424242">无 tool calls：LLM 直接输出文本回复，不触发任何工具；进入 DONE 后流式写回用户并 yield Success</text>

  <rect x="440" y="550" width="12" height="12" rx="2" fill="#6A1B9A"/>
  <text x="460" y="561" font-size="9.5" fill="#424242">继续推理（loop）：工具调用有非 action 类结果写回 → LLM 需要在新上下文中继续推理；最多循环 N 轮</text>

  <!-- Caption -->
  <text x="460" y="600" text-anchor="middle" font-size="10" fill="#9E9E9E">pass/stop 均由 LLM 通过 tool call 主动触发；Action 类调用（action-*前缀）无需等待 LLM 继续推理，立即执行后不写 TOOL_RESULT</text>
</svg>
