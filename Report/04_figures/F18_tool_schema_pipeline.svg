<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AD1457"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#E0E0E0" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#212121">Figure F18 · 工具注册与 Schema 生成流程</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#757575">Tool Registration and Schema Generation Pipeline</text>
  <line x1="60" y1="66" x2="840" y2="66" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ===== COLUMN 1: Class Definition ===== -->
  <rect x="40" y="90" width="180" height="120" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="130" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">① 组件类定义</text>
  <text x="130" y="130" text-anchor="middle" font-size="10" fill="#BBDEFB">class MyTool(BaseTool):</text>
  <text x="130" y="147" text-anchor="middle" font-size="10" fill="#BBDEFB">  tool_name = "my_tool"</text>
  <text x="130" y="164" text-anchor="middle" font-size="10" fill="#BBDEFB">  async def execute(</text>
  <text x="130" y="181" text-anchor="middle" font-size="10" fill="#BBDEFB">    x: Annotated[str,"..."])</text>
  <text x="130" y="198" text-anchor="middle" font-size="10" fill="#BBDEFB">  → tuple[bool, str]</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="150" x2="268" y2="150" stroke="#546E7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="244" y="144" text-anchor="middle" font-size="9" fill="#546E7A">inspect</text>

  <!-- ===== COLUMN 2: Schema Generation ===== -->
  <rect x="270" y="90" width="180" height="120" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="360" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">② Schema 生成</text>
  <text x="360" y="130" text-anchor="middle" font-size="10" fill="#E1BEE7">to_schema() →</text>
  <text x="360" y="147" text-anchor="middle" font-size="10" fill="#E1BEE7">{type: "function",</text>
  <text x="360" y="164" text-anchor="middle" font-size="10" fill="#E1BEE7">  name: "my_tool",</text>
  <text x="360" y="181" text-anchor="middle" font-size="10" fill="#E1BEE7">  parameters: {</text>
  <text x="360" y="198" text-anchor="middle" font-size="10" fill="#E1BEE7">    x: {type: "string"}}}</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="150" x2="498" y2="150" stroke="#546E7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="474" y="144" text-anchor="middle" font-size="9" fill="#546E7A">register</text>

  <!-- ===== COLUMN 3: ToolRegistry ===== -->
  <rect x="500" y="90" width="180" height="120" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <text x="590" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">③ ToolRegistry</text>
  <text x="590" y="132" text-anchor="middle" font-size="10" fill="#B2DFDB">{</text>
  <text x="590" y="149" text-anchor="middle" font-size="10" fill="#B2DFDB">  "my_tool": MyTool,</text>
  <text x="590" y="166" text-anchor="middle" font-size="10" fill="#B2DFDB">  "send_text": SendText,</text>
  <text x="590" y="183" text-anchor="middle" font-size="10" fill="#B2DFDB">  "think": ThinkAction,</text>
  <text x="590" y="200" text-anchor="middle" font-size="10" fill="#B2DFDB">  ... (N 个组件)</text>

  <!-- Arrow 3→4 -->
  <line x1="680" y1="150" x2="728" y2="150" stroke="#546E7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="704" y="144" text-anchor="middle" font-size="9" fill="#546E7A">payload</text>

  <!-- ===== COLUMN 4: LLM Request ===== -->
  <rect x="730" y="90" width="135" height="120" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="797" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">④ LLM Request</text>
  <text x="797" y="132" text-anchor="middle" font-size="10" fill="#FFE0B2">add_payload(</text>
  <text x="797" y="149" text-anchor="middle" font-size="10" fill="#FFE0B2">  ROLE.TOOL,</text>
  <text x="797" y="166" text-anchor="middle" font-size="10" fill="#FFE0B2">  [schema_list]</text>
  <text x="797" y="183" text-anchor="middle" font-size="10" fill="#FFE0B2">)</text>
  <text x="797" y="200" text-anchor="middle" font-size="10" fill="#FFE0B2">→ send(stream)</text>

  <!-- ===== Filter box ===== -->
  <rect x="230" y="255" width="460" height="95" rx="8" fill="white" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="255" width="460" height="26" rx="8" fill="#E3F2FD"/>
  <rect x="230" y="270" width="460" height="10" fill="#E3F2FD"/>
  <text x="460" y="273" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">过滤机制（执行前动态裁剪工具列表）</text>
  <!-- Three filters -->
  <rect x="248" y="290" width="130" height="48" rx="6" fill="#EDE7F6"/>
  <text x="313" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#4527A0">chatter_allow</text>
  <text x="313" y="324" text-anchor="middle" font-size="9" fill="#5E35B1">仅特定 chatter</text>
  <text x="313" y="338" text-anchor="middle" font-size="9" fill="#5E35B1">可见此工具</text>

  <rect x="395" y="290" width="130" height="48" rx="6" fill="#E8F5E9"/>
  <text x="460" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">associated_types</text>
  <text x="460" y="324" text-anchor="middle" font-size="9" fill="#2E7D32">适配器类型</text>
  <text x="460" y="338" text-anchor="middle" font-size="9" fill="#2E7D32">必须匹配</text>

  <rect x="542" y="290" width="130" height="48" rx="6" fill="#FFF3E0"/>
  <text x="607" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#BF360C">go_activate()</text>
  <text x="607" y="324" text-anchor="middle" font-size="9" fill="#E64A19">组件自声明</text>
  <text x="607" y="338" text-anchor="middle" font-size="9" fill="#E64A19">当前是否可用</text>

  <!-- Arrow from ToolRegistry down to filter -->
  <line x1="590" y1="210" x2="590" y2="253" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ===== MCP Box ===== -->
  <rect x="40" y="270" width="165" height="80" rx="8" fill="white" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="270" width="165" height="26" rx="8" fill="#E8F5E9"/>
  <rect x="40" y="285" width="165" height="10" fill="#E8F5E9"/>
  <text x="122" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">MCP 外部工具</text>
  <text x="122" y="306" text-anchor="middle" font-size="9.5" fill="#388E3C">MCPToolAdapter.to_schema()</text>
  <text x="122" y="322" text-anchor="middle" font-size="9.5" fill="#388E3C">统一注册到 ToolRegistry</text>
  <text x="122" y="338" text-anchor="middle" font-size="9.5" fill="#388E3C">调用透传到外部进程</text>

  <!-- Arrow from MCP to ToolRegistry -->
  <path d="M 205 310 Q 350 310 498 210" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="320" y="298" text-anchor="middle" font-size="9" fill="#388E3C">MCPAdapter</text>

  <!-- ===== Bottom: Execution ===== -->
  <rect x="140" y="400" width="620" height="115" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="140" y="400" width="620" height="26" rx="8" fill="#FBE9E7"/>
  <rect x="140" y="415" width="620" height="10" fill="#FBE9E7"/>
  <text x="450" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#BF360C">执行阶段（Tool Call 解析 → 实例化 → 调度）</text>

  <rect x="158" y="435" width="168" height="68" rx="6" fill="#F3E5F5"/>
  <text x="242" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#6A1B9A">LLM 返回 ToolCall</text>
  <text x="242" y="468" text-anchor="middle" font-size="9" fill="#7B1FA2">{ id, name, args }</text>
  <text x="242" y="484" text-anchor="middle" font-size="9" fill="#7B1FA2">→ 按 name 查注册表</text>
  <text x="242" y="498" text-anchor="middle" font-size="9" fill="#7B1FA2">→ 获取组件类</text>

  <text x="342" y="472" text-anchor="middle" font-size="18" fill="#546E7A">→</text>

  <rect x="356" y="435" width="168" height="68" rx="6" fill="#E8EAF6"/>
  <text x="440" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#1A237E">实例化 &amp; 执行</text>
  <text x="440" y="468" text-anchor="middle" font-size="9" fill="#283593">Tool(plugin).execute(**args)</text>
  <text x="440" y="484" text-anchor="middle" font-size="9" fill="#283593">Action(chat_stream).execute()</text>
  <text x="440" y="498" text-anchor="middle" font-size="9" fill="#283593">并行调度 (asyncio)</text>

  <text x="540" y="472" text-anchor="middle" font-size="18" fill="#546E7A">→</text>

  <rect x="554" y="435" width="188" height="68" rx="6" fill="#E0F2F1"/>
  <text x="648" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#004D40">写回 TOOL_RESULT</text>
  <text x="648" y="468" text-anchor="middle" font-size="9" fill="#00695C">按原始顺序追加</text>
  <text x="648" y="484" text-anchor="middle" font-size="9" fill="#00695C">result_text → LLMPayload</text>
  <text x="648" y="498" text-anchor="middle" font-size="9" fill="#00695C">(ROLE.TOOL_RESULT)</text>

  <!-- Arrow filter→execution -->
  <line x1="450" y1="350" x2="450" y2="398" stroke="#BF360C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="468" y="378" text-anchor="start" font-size="9" fill="#BF360C">裁剪后的工具集</text>

  <!-- Caption -->
  <text x="450" y="535" text-anchor="middle" font-size="10" fill="#9E9E9E">工具 Schema 由 execute() 的类型注解自动推导；MCP 工具通过适配器统一进入注册表；执行结果按原始调用顺序写回 LLM 上下文</text>
</svg>
