<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="cortexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0EC"/>
      <stop offset="100%" stop-color="#FFC0CB"/>
    </linearGradient>
    <linearGradient id="limbicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#FF80A0"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2D2D3E"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#E91E63"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)"/>

  <text x="700" y="55" text-anchor="middle" font-size="32" font-weight="700" fill="#2D2D3E">Neo-MoFox · 皮层–皮层下三层架构</text>
  <text x="700" y="86" text-anchor="middle" font-size="16" fill="#6B6B7E">Cortex / Limbic / Subcortical · 双轨执行 · 多时间尺度耦合</text>

  <!-- Three layers -->
  <g filter="url(#softShadow)">
    <!-- Cortex -->
    <rect x="180" y="130" width="1040" height="160" rx="20" fill="url(#cortexGrad)" stroke="#E91E63" stroke-width="2"/>
    <text x="220" y="170" font-size="22" font-weight="700" fill="#2D2D3E">Cortex · 皮层层</text>
    <text x="220" y="195" font-size="13" fill="#5A5A6E">高阶整合 · 自然语言表达 · 工具调用 · 角色一致性</text>

    <rect x="240" y="215" width="200" height="60" rx="10" fill="white" stroke="#C2185B" stroke-width="1.5"/>
    <text x="340" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">DFC · 对话内核</text>
    <text x="340" y="266" text-anchor="middle" font-size="11" fill="#6B6B7E">default_chatter</text>

    <rect x="480" y="215" width="200" height="60" rx="10" fill="white" stroke="#C2185B" stroke-width="1.5"/>
    <text x="580" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">LLM · 大语言模型</text>
    <text x="580" y="266" text-anchor="middle" font-size="11" fill="#6B6B7E">流式推理 · 慢轴 · 秒级</text>

    <rect x="720" y="215" width="200" height="60" rx="10" fill="white" stroke="#C2185B" stroke-width="1.5"/>
    <text x="820" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">Tools · 工具调用</text>
    <text x="820" y="266" text-anchor="middle" font-size="11" fill="#6B6B7E">外部世界接口</text>

    <rect x="960" y="215" width="200" height="60" rx="10" fill="white" stroke="#C2185B" stroke-width="1.5"/>
    <text x="1060" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#2D2D3E">Persona · 角色资产</text>
    <text x="1060" y="266" text-anchor="middle" font-size="11" fill="#6B6B7E">人格设定 · 风格</text>
  </g>

  <g filter="url(#softShadow)">
    <!-- Limbic -->
    <rect x="180" y="320" width="1040" height="160" rx="20" fill="url(#limbicGrad)" stroke="#C2185B" stroke-width="2"/>
    <text x="220" y="360" font-size="22" font-weight="700" fill="#2D2D3E">Limbic · 调质层</text>
    <text x="220" y="385" font-size="13" fill="#3D3D4E">情绪惯性 · 昼夜节律 · 习惯稳态 · 慢回归 ODE</text>

    <g>
      <rect x="240" y="405" width="150" height="60" rx="10" fill="white" stroke="#AD1457" stroke-width="1.5"/>
      <text x="315" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D3E">Curiosity</text>
      <text x="315" y="450" text-anchor="middle" font-size="11" fill="#6B6B7E">τ ≈ 1800s</text>
    </g>
    <g>
      <rect x="406" y="405" width="150" height="60" rx="10" fill="white" stroke="#AD1457" stroke-width="1.5"/>
      <text x="481" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D3E">Sociability</text>
      <text x="481" y="450" text-anchor="middle" font-size="11" fill="#6B6B7E">τ ≈ 3600s</text>
    </g>
    <g>
      <rect x="572" y="405" width="150" height="60" rx="10" fill="white" stroke="#AD1457" stroke-width="1.5"/>
      <text x="647" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D3E">Focus</text>
      <text x="647" y="450" text-anchor="middle" font-size="11" fill="#6B6B7E">τ ≈ 5400s</text>
    </g>
    <g>
      <rect x="738" y="405" width="150" height="60" rx="10" fill="white" stroke="#AD1457" stroke-width="1.5"/>
      <text x="813" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D3E">Contentment</text>
      <text x="813" y="450" text-anchor="middle" font-size="11" fill="#6B6B7E">τ ≈ 5400s</text>
    </g>
    <g>
      <rect x="904" y="405" width="150" height="60" rx="10" fill="white" stroke="#AD1457" stroke-width="1.5"/>
      <text x="979" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D3E">Energy</text>
      <text x="979" y="450" text-anchor="middle" font-size="11" fill="#6B6B7E">τ ≈ 10800s</text>
    </g>
    <g>
      <rect x="1070" y="405" width="120" height="60" rx="10" fill="#FFF" stroke="#AD1457" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="1130" y="428" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D3E">昼夜节律</text>
      <text x="1130" y="448" text-anchor="middle" font-size="11" fill="#6B6B7E">双峰高斯</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <!-- Subcortical -->
    <rect x="180" y="510" width="1040" height="200" rx="20" fill="url(#subGrad)" stroke="#880E4F" stroke-width="2"/>
    <text x="220" y="550" font-size="22" font-weight="700" fill="#FFF">Subcortical · 皮层下层</text>
    <text x="220" y="575" font-size="13" fill="#FFE0EC">脉冲神经网络 · 软 STDP · 本地学习 · 快轴 · 秒级</text>

    <g>
      <rect x="240" y="595" width="220" height="90" rx="10" fill="white" stroke="#FFB6C1" stroke-width="1.5"/>
      <text x="350" y="625" text-anchor="middle" font-size="15" font-weight="700" fill="#2D2D3E">SNN 网络</text>
      <text x="350" y="648" text-anchor="middle" font-size="12" fill="#5A5A6E">8 → 16 → 6 LIF</text>
      <text x="350" y="666" text-anchor="middle" font-size="11" fill="#6B6B7E">软 STDP · 自稳态阈值</text>
    </g>
    <g>
      <rect x="475" y="595" width="220" height="90" rx="10" fill="white" stroke="#FFB6C1" stroke-width="1.5"/>
      <text x="585" y="625" text-anchor="middle" font-size="15" font-weight="700" fill="#2D2D3E">Memory Graph</text>
      <text x="585" y="648" text-anchor="middle" font-size="12" fill="#5A5A6E">Node · Edge · 6 类关系</text>
      <text x="585" y="666" text-anchor="middle" font-size="11" fill="#6B6B7E">Ebbinghaus 衰减 · Hebbian</text>
    </g>
    <g>
      <rect x="710" y="595" width="220" height="90" rx="10" fill="white" stroke="#FFB6C1" stroke-width="1.5"/>
      <text x="820" y="625" text-anchor="middle" font-size="15" font-weight="700" fill="#2D2D3E">Dream Engine</text>
      <text x="820" y="648" text-anchor="middle" font-size="12" fill="#5A5A6E">NREM · REM · 叙事生成</text>
      <text x="820" y="666" text-anchor="middle" font-size="11" fill="#6B6B7E">离线巩固 · 残影注入</text>
    </g>
    <g>
      <rect x="945" y="595" width="245" height="90" rx="10" fill="white" stroke="#FFB6C1" stroke-width="1.5"/>
      <text x="1067" y="625" text-anchor="middle" font-size="15" font-weight="700" fill="#2D2D3E">Heartbeat · 30s</text>
      <text x="1067" y="648" text-anchor="middle" font-size="12" fill="#5A5A6E">事件代数 · 持久化</text>
      <text x="1067" y="666" text-anchor="middle" font-size="11" fill="#6B6B7E">SNN tick 10s · 心跳 30s</text>
    </g>
  </g>

  <!-- Inter-layer arrows -->
  <g stroke="#2D2D3E" stroke-width="2" fill="none" marker-end="url(#arrowDark)">
    <path d="M340 595 L340 480"/>
    <path d="M820 595 L820 480"/>
  </g>
  <g stroke="#E91E63" stroke-width="2" fill="none" marker-end="url(#arrowPink)" stroke-dasharray="6 4">
    <path d="M340 405 L340 290"/>
    <path d="M820 405 L820 290"/>
  </g>
  <g stroke="#2D2D3E" stroke-width="1.6" fill="none" marker-end="url(#arrowDark)">
    <path d="M580 290 L580 380"/>
    <path d="M1060 290 L1060 380"/>
  </g>

  <!-- Side annotations: dual track -->
  <g>
    <rect x="20" y="320" width="140" height="170" rx="10" fill="#FFF" stroke="#E91E63" stroke-width="1.5"/>
    <text x="90" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#E91E63">DFC 轨</text>
    <text x="90" y="370" text-anchor="middle" font-size="11" fill="#3D3D4E">用户驱动</text>
    <text x="90" y="388" text-anchor="middle" font-size="11" fill="#3D3D4E">事件触发</text>
    <text x="90" y="406" text-anchor="middle" font-size="11" fill="#3D3D4E">无内在周期</text>
    <text x="90" y="430" text-anchor="middle" font-size="11" fill="#6B6B7E">— 被动 —</text>
    <line x1="40" y1="445" x2="140" y2="445" stroke="#E91E63" stroke-dasharray="2 2"/>
    <text x="90" y="470" text-anchor="middle" font-size="11" fill="#6B6B7E">同步 await 接口</text>
  </g>

  <g>
    <rect x="1240" y="510" width="140" height="200" rx="10" fill="#FFF" stroke="#AD1457" stroke-width="1.5"/>
    <text x="1310" y="540" text-anchor="middle" font-size="14" font-weight="700" fill="#AD1457">Life Engine 轨</text>
    <text x="1310" y="562" text-anchor="middle" font-size="11" fill="#3D3D4E">独立心跳</text>
    <text x="1310" y="580" text-anchor="middle" font-size="11" fill="#3D3D4E">30s 周期</text>
    <text x="1310" y="598" text-anchor="middle" font-size="11" fill="#3D3D4E">不依赖输入</text>
    <text x="1310" y="618" text-anchor="middle" font-size="11" fill="#3D3D4E">SNN tick 10s</text>
    <text x="1310" y="640" text-anchor="middle" font-size="11" fill="#6B6B7E">— 主动 —</text>
    <line x1="1260" y1="655" x2="1360" y2="655" stroke="#AD1457" stroke-dasharray="2 2"/>
    <text x="1310" y="680" text-anchor="middle" font-size="11" fill="#6B6B7E">异步队列接口</text>
  </g>

  <!-- Timescale strip at bottom -->
  <g>
    <rect x="180" y="745" width="1040" height="100" rx="14" fill="#FFFFFF" stroke="#E0E0E0"/>
    <text x="700" y="772" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">多时间尺度耦合 · Multi-Timescale Coupling</text>
    <line x1="220" y1="810" x2="1180" y2="810" stroke="#2D2D3E" stroke-width="1.5"/>
    <g font-size="11" fill="#3D3D4E" text-anchor="middle">
      <circle cx="260" cy="810" r="4" fill="#E91E63"/><text x="260" y="830">µs · LIF</text>
      <circle cx="400" cy="810" r="4" fill="#E91E63"/><text x="400" y="830">10s · SNN tick</text>
      <circle cx="560" cy="810" r="4" fill="#C2185B"/><text x="560" y="830">30s · Heartbeat</text>
      <circle cx="730" cy="810" r="4" fill="#AD1457"/><text x="730" y="830">分时 · 调质 ODE</text>
      <circle cx="900" cy="810" r="4" fill="#880E4F"/><text x="900" y="830">天 · 习惯 streak</text>
      <circle cx="1080" cy="810" r="4" fill="#560027"/><text x="1080" y="830">月 · 记忆衰减</text>
    </g>
  </g>

  <text x="700" y="880" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F1 · Three-Layer Cortex–Subcortex Architecture with Dual Tracks and Multi-Timescale Coupling</text>
</svg>
