<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="shadow19" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arr19" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
    <marker id="arr19w" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AD1457"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bg19)" rx="12"/>
  <rect x="1" y="1" width="898" height="598" fill="none" stroke="#E0E0E0" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#212121">Figure F19 · 上下文组装层次图</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#757575">Context Assembly Pipeline: System Layer → User Layer → Nucleus Injection</text>
  <line x1="60" y1="66" x2="840" y2="66" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ============ SYSTEM LAYER ============ -->
  <rect x="40" y="82" width="820" height="140" rx="10" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow19)"/>
  <rect x="40" y="82" width="820" height="28" rx="10" fill="#1565C0"/>
  <rect x="40" y="98" width="820" height="12" fill="#1565C0"/>
  <text x="450" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="white">① SYSTEM PROMPT 层（静态 + 会话固定）</text>

  <!-- System blocks -->
  <rect x="60" y="118" width="170" height="90" rx="6" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="145" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">人格核心</text>
  <text x="145" y="153" text-anchor="middle" font-size="9" fill="#1565C0">personality_core</text>
  <text x="145" y="168" text-anchor="middle" font-size="9" fill="#1565C0">personality_side</text>
  <text x="145" y="183" text-anchor="middle" font-size="9" fill="#1565C0">reply_style</text>
  <text x="145" y="198" text-anchor="middle" font-size="9" fill="#1565C0">identity / background</text>

  <rect x="248" y="118" width="170" height="90" rx="6" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="333" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">场景引导</text>
  <text x="333" y="153" text-anchor="middle" font-size="9" fill="#1565C0">platform / chat_type</text>
  <text x="333" y="168" text-anchor="middle" font-size="9" fill="#1565C0">bot_nickname / bot_id</text>
  <text x="333" y="183" text-anchor="middle" font-size="9" fill="#1565C0">theme_guide.private</text>
  <text x="333" y="198" text-anchor="middle" font-size="9" fill="#1565C0">theme_guide.group</text>

  <rect x="436" y="118" width="170" height="90" rx="6" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="521" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">PromptTemplate 引擎</text>
  <text x="521" y="153" text-anchor="middle" font-size="9" fill="#1565C0">占位符 {key} 替换</text>
  <text x="521" y="168" text-anchor="middle" font-size="9" fill="#1565C0">渲染策略链</text>
  <text x="521" y="183" text-anchor="middle" font-size="9" fill="#1565C0">trim / min_len / optional</text>
  <text x="521" y="198" text-anchor="middle" font-size="9" fill="#1565C0">on_prompt_build 事件</text>

  <rect x="624" y="118" width="215" height="90" rx="6" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <text x="731" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">技能目录（skill_catalog）</text>
  <text x="731" y="153" text-anchor="middle" font-size="9" fill="#1565C0">已注册 Tools/Actions 描述</text>
  <text x="731" y="168" text-anchor="middle" font-size="9" fill="#1565C0">负面行为提醒</text>
  <text x="731" y="183" text-anchor="middle" font-size="9" fill="#1565C0">(reinforce_negative_behaviors)</text>
  <text x="731" y="198" text-anchor="middle" font-size="9" fill="#1565C0">ROLE.SYSTEM payload</text>

  <!-- Down arrow -->
  <line x1="450" y1="222" x2="450" y2="248" stroke="#546E7A" stroke-width="2" marker-end="url(#arr19)"/>

  <!-- ============ USER LAYER ============ -->
  <rect x="40" y="250" width="820" height="165" rx="10" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow19)"/>
  <rect x="40" y="250" width="820" height="28" rx="10" fill="#2E7D32"/>
  <rect x="40" y="267" width="820" height="12" fill="#2E7D32"/>
  <text x="450" y="269" text-anchor="middle" font-size="13" font-weight="700" fill="white">② USER PROMPT 层（动态，每轮重建）</text>

  <!-- User blocks - row 1 -->
  <rect x="58" y="286" width="163" height="72" rx="6" fill="white" stroke="#A5D6A7" stroke-width="1"/>
  <text x="140" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#1B5E20">历史消息 (history)</text>
  <text x="140" y="319" text-anchor="middle" font-size="9" fill="#2E7D32">chat_stream.context</text>
  <text x="140" y="334" text-anchor="middle" font-size="9" fill="#2E7D32">.history_messages</text>
  <text x="140" y="349" text-anchor="middle" font-size="9" fill="#2E7D32">格式化文本行</text>

  <rect x="236" y="286" width="163" height="72" rx="6" fill="white" stroke="#A5D6A7" stroke-width="1"/>
  <text x="317" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#1B5E20">未读消息 (unreads)</text>
  <text x="317" y="319" text-anchor="middle" font-size="9" fill="#2E7D32">本轮待处理消息列表</text>
  <text x="317" y="334" text-anchor="middle" font-size="9" fill="#2E7D32">包含时间戳/发送者</text>
  <text x="317" y="349" text-anchor="middle" font-size="9" fill="#2E7D32">/消息内容</text>

  <rect x="414" y="286" width="163" height="72" rx="6" fill="white" stroke="#A5D6A7" stroke-width="1"/>
  <text x="495" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#1B5E20">会话元信息</text>
  <text x="495" y="319" text-anchor="middle" font-size="9" fill="#2E7D32">stream_name / 时间戳</text>
  <text x="495" y="334" text-anchor="middle" font-size="9" fill="#2E7D32">platform / chat_type</text>
  <text x="495" y="349" text-anchor="middle" font-size="9" fill="#2E7D32">bot_name / bot_id</text>

  <rect x="592" y="286" width="250" height="72" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <text x="717" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#F57F17">extra 块（可插拔注入）</text>
  <text x="717" y="319" text-anchor="middle" font-size="9" fill="#F57F17">负面行为强调文本</text>
  <text x="717" y="334" text-anchor="middle" font-size="9" fill="#F57F17">+ 连续记忆 (continuous_memory)</text>
  <text x="717" y="349" text-anchor="middle" font-size="9" fill="#F57F17">+ notice / 自定义注入</text>

  <!-- ============ NUCLEUS INJECTION LAYER ============ -->
  <!-- Arrow down -->
  <line x1="450" y1="415" x2="450" y2="441" stroke="#546E7A" stroke-width="2" marker-end="url(#arr19)"/>

  <rect x="40" y="443" width="820" height="115" rx="10" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5" filter="url(#shadow19)"/>
  <rect x="40" y="443" width="820" height="28" rx="10" fill="#AD1457"/>
  <rect x="40" y="459" width="820" height="12" fill="#AD1457"/>
  <text x="450" y="462" text-anchor="middle" font-size="13" font-weight="700" fill="white">③ Nucleus 内在状态注入层（on_prompt_build 事件钩子）</text>

  <rect x="58" y="479" width="187" height="68" rx="6" fill="white" stroke="#F48FB1" stroke-width="1"/>
  <text x="151" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#880E4F">consult_nucleus 工具</text>
  <text x="151" y="512" text-anchor="middle" font-size="9" fill="#AD1457">LLM 主动 pull</text>
  <text x="151" y="527" text-anchor="middle" font-size="9" fill="#AD1457">drives / neuromod / TODO</text>
  <text x="151" y="539" text-anchor="middle" font-size="9" fill="#AD1457">同步查询当前内在状态</text>

  <rect x="260" y="479" width="187" height="68" rx="6" fill="white" stroke="#F48FB1" stroke-width="1"/>
  <text x="353" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#880E4F">push_runtime_injection</text>
  <text x="353" y="512" text-anchor="middle" font-size="9" fill="#AD1457">Life Engine 主动 push</text>
  <text x="353" y="527" text-anchor="middle" font-size="9" fill="#AD1457">梦境余韵 / 离线巩固结论</text>
  <text x="353" y="539" text-anchor="middle" font-size="9" fill="#AD1457">注入 assistant context</text>

  <rect x="462" y="479" width="187" height="68" rx="6" fill="white" stroke="#F48FB1" stroke-width="1"/>
  <text x="555" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#880E4F">nucleus_bridge（心跳注入）</text>
  <text x="555" y="512" text-anchor="middle" font-size="9" fill="#AD1457">心跳触发 wake</text>
  <text x="555" y="527" text-anchor="middle" font-size="9" fill="#AD1457">携带当前内在状态快照</text>
  <text x="555" y="539" text-anchor="middle" font-size="9" fill="#AD1457">注入 user extra 块</text>

  <rect x="664" y="479" width="176" height="68" rx="6" fill="#FFF3E0" stroke="#FFAB91" stroke-width="1"/>
  <text x="752" y="496" text-anchor="middle" font-size="10" font-weight="700" fill="#BF360C">事件拦截（EventBus）</text>
  <text x="752" y="512" text-anchor="middle" font-size="9" fill="#E64A19">on_prompt_build</text>
  <text x="752" y="527" text-anchor="middle" font-size="9" fill="#E64A19">任意插件可订阅并</text>
  <text x="752" y="539" text-anchor="middle" font-size="9" fill="#E64A19">修改 template/values</text>

  <!-- Caption -->
  <text x="450" y="576" text-anchor="middle" font-size="10" fill="#9E9E9E">上下文由三层叠加构成；Nucleus 注入层通过事件总线实现对任意层的动态修改，使内在状态可无侵入地渗透进 LLM 上下文</text>
</svg>
