<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bgGrad)"/>

  <text x="800" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">心跳事件流时间轴 · 多层级事件交错</text>
  <text x="800" y="68" text-anchor="middle" font-size="13" fill="#6B6B7E">90 秒内的事件密度展示：SNN tick (10s) · 心跳 (30s) · 调质演化 · 用户消息 · 工具调用</text>

  <!-- Main timeline -->
  <g stroke="#2D2D3E" stroke-width="2" fill="none">
    <line x1="120" y1="500" x2="1480" y2="500"/>
    <polygon points="1480,500 1470,496 1470,504" fill="#2D2D3E"/>
  </g>

  <!-- Time markers: 0s, 10s, 20s, 30s, 60s, 90s -->
  <!-- Timeline span 120 to 1480 = 1360px for 90s -->
  <!-- Each second = 1360/90 ≈ 15.1px -->
  <g font-size="12" fill="#2D2D3E" text-anchor="middle">
    <line x1="120" y1="495" x2="120" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="120" y="525">0s</text>
    
    <line x1="271" y1="495" x2="271" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="271" y="525">10s</text>
    
    <line x1="422" y1="495" x2="422" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="422" y="525">20s</text>
    
    <line x1="573" y1="495" x2="573" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="573" y="525">30s</text>
    
    <line x1="1026" y1="495" x2="1026" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="1026" y="525">60s</text>
    
    <line x1="1480" y1="495" x2="1480" y2="505" stroke="#2D2D3E" stroke-width="2"/>
    <text x="1480" y="525">90s</text>
  </g>

  <!-- Layer 1: SNN tick (every 10s) - dense small dots -->
  <g>
    <text x="60" y="180" text-anchor="end" font-size="13" font-weight="600" fill="#E91E63">SNN tick</text>
    <text x="60" y="198" text-anchor="end" font-size="10" fill="#6B6B7E">10s 一次</text>
    
    <circle cx="120" cy="180" r="6" fill="#E91E63"/>
    <circle cx="271" cy="180" r="6" fill="#E91E63"/>
    <circle cx="422" cy="180" r="6" fill="#E91E63"/>
    <circle cx="573" cy="180" r="6" fill="#E91E63"/>
    <circle cx="724" cy="180" r="6" fill="#E91E63"/>
    <circle cx="875" cy="180" r="6" fill="#E91E63"/>
    <circle cx="1026" cy="180" r="6" fill="#E91E63"/>
    <circle cx="1177" cy="180" r="6" fill="#E91E63"/>
    <circle cx="1328" cy="180" r="6" fill="#E91E63"/>
    
    <!-- Vertical dashed lines for each tick -->
    <g stroke="#FFE0EC" stroke-dasharray="2 3" stroke-width="1">
      <line x1="120" y1="190" x2="120" y2="490"/>
      <line x1="271" y1="190" x2="271" y2="490"/>
      <line x1="422" y1="190" x2="422" y2="490"/>
      <line x1="573" y1="190" x2="573" y2="490"/>
      <line x1="724" y1="190" x2="724" y2="490"/>
      <line x1="875" y1="190" x2="875" y2="490"/>
      <line x1="1026" y1="190" x2="1026" y2="490"/>
      <line x1="1177" y1="190" x2="1177" y2="490"/>
      <line x1="1328" y1="190" x2="1328" y2="490"/>
    </g>
  </g>

  <!-- Layer 2: Heartbeat (every 30s) - larger markers -->
  <g>
    <text x="60" y="250" text-anchor="end" font-size="13" font-weight="600" fill="#C2185B">Heartbeat</text>
    <text x="60" y="268" text-anchor="end" font-size="10" fill="#6B6B7E">30s 一次</text>
    
    <g filter="url(#softShadow)">
      <rect x="100" y="235" width="40" height="30" rx="6" fill="#C2185B" stroke="#880E4F" stroke-width="2"/>
      <text x="120" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">♥</text>
    </g>
    
    <g filter="url(#softShadow)">
      <rect x="553" y="235" width="40" height="30" rx="6" fill="#C2185B" stroke="#880E4F" stroke-width="2"/>
      <text x="573" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">♥</text>
    </g>
    
    <g filter="url(#softShadow)">
      <rect x="1006" y="235" width="40" height="30" rx="6" fill="#C2185B" stroke="#880E4F" stroke-width="2"/>
      <text x="1026" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">♥</text>
    </g>
  </g>

  <!-- Layer 3: Neuromodulator ODE steps (dense, continuous) -->
  <g>
    <text x="60" y="320" text-anchor="end" font-size="13" font-weight="600" fill="#AD1457">调质 ODE</text>
    <text x="60" y="338" text-anchor="end" font-size="10" fill="#6B6B7E">持续演化</text>
    
    <!-- Continuous wave to represent continuous evolution -->
    <path d="M 120 320 Q 195 310, 271 320 T 422 320 T 573 320 T 724 320 T 875 320 T 1026 320 T 1177 320 T 1328 320 T 1480 320"
          fill="none" stroke="#AD1457" stroke-width="2.5"/>
    
    <!-- Small dots along the wave -->
    <g fill="#AD1457">
      <circle cx="120" cy="320" r="3"/>
      <circle cx="195" cy="312" r="3"/>
      <circle cx="271" cy="320" r="3"/>
      <circle cx="346" cy="312" r="3"/>
      <circle cx="422" cy="320" r="3"/>
      <circle cx="497" cy="312" r="3"/>
      <circle cx="573" cy="320" r="3"/>
      <circle cx="648" cy="312" r="3"/>
      <circle cx="724" cy="320" r="3"/>
      <circle cx="800" cy="312" r="3"/>
      <circle cx="875" cy="320" r="3"/>
      <circle cx="950" cy="312" r="3"/>
      <circle cx="1026" cy="320" r="3"/>
      <circle cx="1101" cy="312" r="3"/>
      <circle cx="1177" cy="320" r="3"/>
      <circle cx="1252" cy="312" r="3"/>
      <circle cx="1328" cy="320" r="3"/>
      <circle cx="1404" cy="312" r="3"/>
      <circle cx="1480" cy="320" r="3"/>
    </g>
  </g>

  <!-- Layer 4: User messages (irregular) -->
  <g>
    <text x="60" y="390" text-anchor="end" font-size="13" font-weight="600" fill="#2D2D3E">用户消息</text>
    <text x="60" y="408" text-anchor="end" font-size="10" fill="#6B6B7E">不规则</text>
    
    <g filter="url(#softShadow)">
      <rect x="110" y="375" width="60" height="30" rx="6" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5"/>
      <text x="140" y="395" text-anchor="middle" font-size="10" fill="#2D2D3E">msg#1</text>
    </g>
    
    <g filter="url(#softShadow)">
      <rect x="480" y="375" width="60" height="30" rx="6" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5"/>
      <text x="510" y="395" text-anchor="middle" font-size="10" fill="#2D2D3E">msg#2</text>
    </g>
    
    <g filter="url(#softShadow)">
      <rect x="1140" y="375" width="60" height="30" rx="6" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5"/>
      <text x="1170" y="395" text-anchor="middle" font-size="10" fill="#2D2D3E">msg#3</text>
    </g>
  </g>

  <!-- Layer 5: Tool calls (sparse) -->
  <g>
    <text x="60" y="450" text-anchor="end" font-size="13" font-weight="600" fill="#388E3C">工具调用</text>
    <text x="60" y="468" text-anchor="end" font-size="10" fill="#6B6B7E">稀疏</text>
    
    <g filter="url(#softShadow)">
      <rect x="200" y="435" width="80" height="30" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="240" y="455" text-anchor="middle" font-size="10" fill="#2D2D3E">search()</text>
    </g>
    
    <g filter="url(#softShadow)">
      <rect x="1240" y="435" width="80" height="30" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="1280" y="455" text-anchor="middle" font-size="10" fill="#2D2D3E">db.query()</text>
    </g>
  </g>

  <!-- Bottom legend -->
  <g>
    <rect x="100" y="545" width="1400" height="45" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.2"/>
    <text x="120" y="565" font-size="11" fill="#3D3D4E">设计要点：</text>
    <text x="120" y="580" font-size="10" fill="#6B6B7E">心跳周期 (30s) 是同步锚点；SNN tick (10s) 是快速感知层；调质 ODE 是连续状态演化基底；用户消息与工具调用为外部异步事件，通过事件流注入。</text>
  </g>

  <text x="800" y="595" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F12 · Heartbeat Event Timeline: Multi-Layer Event Interleaving over 90 Seconds</text>
</svg>
