<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="600" fill="url(#bgGrad)"/>

  <text x="700" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">记忆图演化 · 三个时间快照</text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#6B6B7E">t=0 (初始) → t=7d (社群萌芽) → t=30d (巩固社群) · 节点大小 ∝ 强度 · 边粗细 ∝ 权重</text>

  <!-- Three panels side by side -->
  
  <!-- Panel 1: t=0 (Day 1) -->
  <g filter="url(#softShadow)">
    <rect x="40" y="100" width="380" height="440" rx="12" fill="#FFFFFF" stroke="#E91E63" stroke-width="2"/>
    <text x="230" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D3E">t = 0 · 初始状态</text>
    <text x="230" y="158" text-anchor="middle" font-size="11" fill="#6B6B7E">稀疏连接 · 均匀强度</text>

    <!-- Simple initial graph: 6 nodes, weak connections -->
    <circle cx="150" cy="240" r="18" fill="#FFE0EC" stroke="#E91E63" stroke-width="2"/>
    <text x="150" y="246" text-anchor="middle" font-size="10" fill="#2D2D3E">用户</text>

    <circle cx="310" cy="240" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="310" y="246" text-anchor="middle" font-size="9" fill="#2D2D3E">天气</text>

    <circle cx="230" cy="330" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="230" y="336" text-anchor="middle" font-size="9" fill="#2D2D3E">爱好</text>

    <circle cx="150" cy="400" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="150" y="406" text-anchor="middle" font-size="9" fill="#2D2D3E">工作</text>

    <circle cx="310" cy="400" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="310" y="406" text-anchor="middle" font-size="9" fill="#2D2D3E">朋友A</text>

    <circle cx="230" cy="470" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="230" y="476" text-anchor="middle" font-size="9" fill="#2D2D3E">项目X</text>

    <!-- Weak edges -->
    <line x1="168" y1="240" x2="292" y2="240" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="160" y1="256" x2="220" y2="317" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="240" y1="345" x2="230" y2="455" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="158" y1="385" x2="165" y2="260" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="305" y1="385" x2="240" y2="345" stroke="#D0D0D0" stroke-width="1.5"/>

    <text x="230" y="520" text-anchor="middle" font-size="10" fill="#9B9BAA">6 节点 · 5 边</text>
  </g>

  <!-- Panel 2: t=7d -->
  <g filter="url(#softShadow)">
    <rect x="510" y="100" width="380" height="440" rx="12" fill="#FFFFFF" stroke="#E91E63" stroke-width="2"/>
    <text x="700" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D3E">t = 7d · 社群萌芽</text>
    <text x="700" y="158" text-anchor="middle" font-size="11" fill="#6B6B7E">部分节点强化 · 新边出现</text>

    <!-- Growing graph: some nodes larger, more edges -->
    <circle cx="620" cy="240" r="24" fill="#E91E63" stroke="#AD1457" stroke-width="2.5"/>
    <text x="620" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">用户</text>

    <circle cx="780" cy="240" r="20" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="780" y="246" text-anchor="middle" font-size="9" fill="#2D2D3E">天气</text>

    <circle cx="700" cy="310" r="22" fill="#FF80A0" stroke="#C2185B" stroke-width="2.5"/>
    <text x="700" y="316" text-anchor="middle" font-size="9" fill="#FFF">爱好</text>

    <circle cx="620" cy="380" r="20" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="620" y="386" text-anchor="middle" font-size="9" fill="#2D2D3E">工作</text>

    <circle cx="780" cy="380" r="20" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="780" y="386" text-anchor="middle" font-size="9" fill="#2D2D3E">朋友A</text>

    <circle cx="700" cy="450" r="18" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="700" y="456" text-anchor="middle" font-size="9" fill="#2D2D3E">项目X</text>

    <circle cx="830" cy="310" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="830" y="316" text-anchor="middle" font-size="9" fill="#2D2D3E">咖啡</text>

    <circle cx="560" cy="310" r="16" fill="#FFC0CB" stroke="#C2185B" stroke-width="1.5"/>
    <text x="560" y="316" text-anchor="middle" font-size="9" fill="#2D2D3E">书籍</text>

    <!-- Edges: stronger connections -->
    <line x1="640" y1="250" x2="760" y2="250" stroke="#E91E63" stroke-width="3"/>
    <line x1="630" y1="260" x2="685" y2="295" stroke="#C2185B" stroke-width="2.5"/>
    <line x1="710" y1="328" x2="700" y2="435" stroke="#C2185B" stroke-width="2.5"/>
    <line x1="628" y1="365" x2="628" y2="260" stroke="#AD1457" stroke-width="2"/>
    <line x1="770" y1="365" x2="710" y2="325" stroke="#C2185B" stroke-width="2"/>
    <line x1="715" y1="310" x2="815" y2="310" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="575" y1="310" x2="680" y2="310" stroke="#D0D0D0" stroke-width="1.5"/>
    <line x1="760" y1="250" x2="780" y2="365" stroke="#C2185B" stroke-width="2"/>

    <text x="700" y="520" text-anchor="middle" font-size="10" fill="#9B9BAA">8 节点 · 10 边</text>
  </g>

  <!-- Panel 3: t=30d -->
  <g filter="url(#softShadow)">
    <rect x="980" y="100" width="380" height="440" rx="12" fill="#FFFFFF" stroke="#E91E63" stroke-width="2"/>
    <text x="1170" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D3E">t = 30d · 巩固社群</text>
    <text x="1170" y="158" text-anchor="middle" font-size="11" fill="#6B6B7E">明显社群结构 · 强弱分化</text>

    <!-- Mature graph: clear clusters -->
    <circle cx="1090" cy="240" r="30" fill="#E91E63" stroke="#880E4F" stroke-width="3"/>
    <text x="1090" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">用户</text>

    <!-- Cluster 1: 爱好相关 -->
    <circle cx="1170" cy="290" r="26" fill="#FF80A0" stroke="#AD1457" stroke-width="2.5"/>
    <text x="1170" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#FFF">爱好</text>

    <circle cx="1250" cy="250" r="18" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="1250" y="256" text-anchor="middle" font-size="8" fill="#2D2D3E">咖啡</text>

    <circle cx="1240" cy="330" r="18" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="1240" y="336" text-anchor="middle" font-size="8" fill="#2D2D3E">书籍</text>

    <!-- Cluster 2: 工作相关 -->
    <circle cx="1090" cy="370" r="24" fill="#FF80A0" stroke="#AD1457" stroke-width="2.5"/>
    <text x="1090" y="376" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">工作</text>

    <circle cx="1010" cy="370" r="20" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="1010" y="376" text-anchor="middle" font-size="8" fill="#2D2D3E">项目X</text>

    <circle cx="1170" cy="420" r="18" fill="#FFB6C1" stroke="#C2185B" stroke-width="2"/>
    <text x="1170" y="426" text-anchor="middle" font-size="8" fill="#2D2D3E">同事B</text>

    <!-- Peripheral node -->
    <circle cx="1270" cy="390" r="16" fill="#FFC0CB" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="1270" y="396" text-anchor="middle" font-size="8" fill="#9B9BAA">天气</text>

    <!-- Strong edges -->
    <line x1="1115" y1="255" x2="1150" y2="280" stroke="#E91E63" stroke-width="4"/>
    <line x1="1192" y1="305" x2="1230" y2="260" stroke="#C2185B" stroke-width="3"/>
    <line x1="1190" y1="315" x2="1225" y2="325" stroke="#C2185B" stroke-width="3"/>
    <line x1="1090" y1="270" x2="1090" y2="345" stroke="#AD1457" stroke-width="3.5"/>
    <line x1="1030" y1="370" x2="1065" y2="370" stroke="#C2185B" stroke-width="3"/>
    <line x1="1105" y1="390" x2="1155" y2="415" stroke="#C2185B" stroke-width="2.5"/>
    <line x1="1250" y1="390" x2="1190" y2="420" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="2 2"/>

    <text x="1170" y="520" text-anchor="middle" font-size="10" fill="#9B9BAA">8 节点 · 12 边 · 2 社群</text>
  </g>

  <!-- Legend for edge types -->
  <g>
    <rect x="50" y="555" width="1300" height="35" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.2"/>
    <text x="70" y="575" font-size="11" fill="#3D3D4E">边类型示例：</text>
    <line x1="160" y1="570" x2="200" y2="570" stroke="#E91E63" stroke-width="3"/>
    <text x="210" y="575" font-size="10" fill="#3D3D4E">强关联 (w&gt;0.7)</text>
    <line x1="320" y1="570" x2="360" y2="570" stroke="#C2185B" stroke-width="2"/>
    <text x="370" y="575" font-size="10" fill="#3D3D4E">中等关联 (0.4&lt;w&lt;0.7)</text>
    <line x1="530" y1="570" x2="570" y2="570" stroke="#D0D0D0" stroke-width="1.5"/>
    <text x="580" y="575" font-size="10" fill="#3D3D4E">弱关联 (w&lt;0.4)</text>
    <text x="1020" y="575" font-size="10" fill="#6B6B7E">节点大小 ∝ 激活强度 · 随 Hebbian 规则与遗忘曲线演化</text>
  </g>
</svg>
