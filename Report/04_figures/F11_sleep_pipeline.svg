<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="nrem" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E1F5FE"/><stop offset="100%" stop-color="#81D4FA"/></linearGradient>
    <linearGradient id="rem" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFE0EC"/><stop offset="100%" stop-color="#E91E63"/></linearGradient>
    <filter id="sh"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#2D2D3E"/></marker>
  </defs>
  <rect width="1400" height="800" fill="#FAFAFA"/>
  <text x="700" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">睡眠流水线 · NREM 稳态缩减 → REM 关联整合 → 叙事 → 巩固反馈</text>
  <text x="700" y="76" text-anchor="middle" font-size="13" fill="#6B6B7E">基于 Tononi &amp; Cirelli (2014) SHY 假说与 REM 关联整合理论</text>

  <!-- 4 stages horizontal -->
  <g filter="url(#sh)">
    <!-- Stage 1: trigger -->
    <rect x="60" y="140" width="240" height="220" rx="14" fill="#FFFFFF" stroke="#9B9BAA"/>
    <text x="180" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#2D2D3E">① 进入睡眠</text>
    <text x="180" y="195" text-anchor="middle" font-size="11" fill="#6B6B7E">调度判定</text>
    <line x1="80" y1="206" x2="280" y2="206" stroke="#E0E0E0"/>
    <text x="80" y="226" font-size="11" fill="#3D3D4E">• energy &lt; 阈值</text>
    <text x="80" y="246" font-size="11" fill="#3D3D4E">• 长时间无交互</text>
    <text x="80" y="266" font-size="11" fill="#3D3D4E">• 当前在夜间窗口</text>
    <text x="80" y="286" font-size="11" fill="#3D3D4E">• 上次梦报告 &gt; 间隔</text>
    <text x="80" y="328" font-size="10" fill="#9B9BAA" font-style="italic">dream/scheduler.py</text>

    <!-- Stage 2: NREM -->
    <rect x="340" y="140" width="280" height="220" rx="14" fill="url(#nrem)" stroke="#0277BD"/>
    <text x="480" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#01579B">② NREM · 突触稳态缩减</text>
    <text x="480" y="195" text-anchor="middle" font-size="11" fill="#01579B">SHY: synaptic homeostasis</text>
    <line x1="360" y1="206" x2="600" y2="206" stroke="#FFFFFF"/>
    <text x="360" y="226" font-size="11" fill="#01579B">• 全网突触权重等比缩减</text>
    <text x="360" y="246" font-size="11" fill="#01579B">  W ← W · (1 − γ)</text>
    <text x="360" y="266" font-size="11" fill="#01579B">• 弱边低于阈值则剪枝</text>
    <text x="360" y="286" font-size="11" fill="#01579B">• 抑制噪声，保留信号</text>
    <text x="360" y="328" font-size="10" fill="#01579B" font-style="italic">dream/nrem.py</text>

    <!-- Stage 3: REM -->
    <rect x="660" y="140" width="280" height="220" rx="14" fill="url(#rem)" stroke="#880E4F"/>
    <text x="800" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">③ REM · 关联整合</text>
    <text x="800" y="195" text-anchor="middle" font-size="11" fill="#FFE0EC">激活扩散随机游走</text>
    <line x1="680" y1="206" x2="920" y2="206" stroke="#FFFFFF66"/>
    <text x="680" y="226" font-size="11" fill="#FFE0EC">• 选 K 个种子节点</text>
    <text x="680" y="246" font-size="11" fill="#FFE0EC">• 沿记忆图随机游走 N 步</text>
    <text x="680" y="266" font-size="11" fill="#FFE0EC">• 统计跨语义簇连接</text>
    <text x="680" y="286" font-size="11" fill="#FFE0EC">• 输出场景候选 (Scene)</text>
    <text x="680" y="328" font-size="10" fill="#FFE0EC" font-style="italic">dream/rem.py</text>

    <!-- Stage 4: narrative -->
    <rect x="980" y="140" width="280" height="220" rx="14" fill="#FFF8E1" stroke="#F9A825"/>
    <text x="1120" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">④ 叙事生成</text>
    <text x="1120" y="195" text-anchor="middle" font-size="11" fill="#E65100">梦报告 (Dream Report)</text>
    <line x1="1000" y1="206" x2="1240" y2="206" stroke="#FFFFFF"/>
    <text x="1000" y="226" font-size="11" fill="#3D3D4E">• 多个 Scene 拼装</text>
    <text x="1000" y="246" font-size="11" fill="#3D3D4E">• 调用 LLM 生成文本</text>
    <text x="1000" y="266" font-size="11" fill="#3D3D4E">• 中文叙事 ~200–500 字</text>
    <text x="1000" y="286" font-size="11" fill="#3D3D4E">• 归档到 dream_archive</text>
    <text x="1000" y="328" font-size="10" fill="#9B9BAA" font-style="italic">dream/narrative.py</text>
  </g>

  <!-- Arrows between stages -->
  <g stroke="#2D2D3E" stroke-width="2" fill="none" marker-end="url(#ar)">
    <path d="M300 250 L340 250"/>
    <path d="M620 250 L660 250"/>
    <path d="M940 250 L980 250"/>
  </g>

  <!-- Seeds at top of REM -->
  <g>
    <text x="800" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#AD1457">种子四类来源</text>
    <text x="800" y="130" text-anchor="middle" font-size="10" fill="#6B6B7E">高活跃 · 高情绪 · 未巩固STDP · 调质极值</text>
  </g>

  <!-- Feedback panel: 巩固反馈 -->
  <g filter="url(#sh)">
    <rect x="60" y="430" width="1200" height="220" rx="14" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.6"/>
    <text x="660" y="462" text-anchor="middle" font-size="18" font-weight="700" fill="#E91E63">⑤ 巩固反馈 · 梦报告如何回写到子系统</text>

    <!-- 4 sub feedback boxes -->
    <g>
      <rect x="100" y="490" width="240" height="130" rx="10" fill="#FCE4EC" stroke="#C2185B"/>
      <text x="220" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">→ SNN</text>
      <text x="115" y="540" font-size="11" fill="#3D3D4E">• 触发种子神经元</text>
      <text x="115" y="558" font-size="11" fill="#3D3D4E">• 偏好性 STDP 增强</text>
      <text x="115" y="576" font-size="11" fill="#3D3D4E">• 部分突触统一缩减</text>
      <text x="115" y="600" font-size="10" fill="#9B9BAA">snn/core.py</text>
    </g>

    <g>
      <rect x="370" y="490" width="240" height="130" rx="10" fill="#FCE4EC" stroke="#C2185B"/>
      <text x="490" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">→ Neuromod</text>
      <text x="385" y="540" font-size="11" fill="#3D3D4E">• 调整次日基线 B</text>
      <text x="385" y="558" font-size="11" fill="#3D3D4E">• 重置 contentment 上限</text>
      <text x="385" y="576" font-size="11" fill="#3D3D4E">• 注入 energy 恢复刺激</text>
      <text x="385" y="600" font-size="10" fill="#9B9BAA">neuromod/engine.py</text>
    </g>

    <g>
      <rect x="640" y="490" width="240" height="130" rx="10" fill="#FCE4EC" stroke="#C2185B"/>
      <text x="760" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">→ Memory Graph</text>
      <text x="655" y="540" font-size="11" fill="#3D3D4E">• 跨簇新建 derived 边</text>
      <text x="655" y="558" font-size="11" fill="#3D3D4E">• 高频节点强度 +</text>
      <text x="655" y="576" font-size="11" fill="#3D3D4E">• 弱节点遗忘加速</text>
      <text x="655" y="600" font-size="10" fill="#9B9BAA">memory/decay.py</text>
    </g>

    <g>
      <rect x="910" y="490" width="240" height="130" rx="10" fill="#FCE4EC" stroke="#C2185B"/>
      <text x="1030" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D3E">→ DFC 注入</text>
      <text x="925" y="540" font-size="11" fill="#3D3D4E">• push_runtime_assistant_</text>
      <text x="925" y="557" font-size="11" fill="#3D3D4E">  injection(stream, text)</text>
      <text x="925" y="576" font-size="11" fill="#3D3D4E">• 次日上下文出现"我做了个梦…"</text>
      <text x="925" y="600" font-size="10" fill="#9B9BAA">service/integrations.py</text>
    </g>
  </g>

  <!-- Side notes -->
  <g font-size="11" fill="#6B6B7E">
    <text x="700" y="700" text-anchor="middle">学术诚实声明：本流水线为工程实现阶段；NREM 稳态缩减与 REM 关联整合的长期效能尚待大规模实测。</text>
  </g>

  <text x="700" y="780" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F11 · Sleep Pipeline: NREM Homeostatic Down-scaling → REM Associative Walk → Narrative Generation → Multi-Subsystem Feedback</text>
</svg>
