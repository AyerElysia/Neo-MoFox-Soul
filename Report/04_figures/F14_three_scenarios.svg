<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <text x="700" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#2D2D3E">三场景对比 · 用户离开 5min / 30min / 3hr</text>
  <text x="700" y="75" text-anchor="middle" font-size="14" fill="#6B6B7E">SNN drives 衰减 · 调质浓度变化 · LLM 表达倾向对比</text>

  <!-- Three columns side by side -->

  <!-- Column 1: 5min -->
  <g filter="url(#softShadow)">
    <rect x="80" y="120" width="370" height="620" rx="15" fill="#FFFFFF" stroke="#E91E63" stroke-width="2.5"/>
    <text x="265" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#E91E63">5 分钟</text>
    <text x="265" y="185" text-anchor="middle" font-size="12" fill="#6B6B7E">短暂离开 · 状态微调</text>

    <!-- SNN drives -->
    <g>
      <text x="110" y="225" font-size="14" font-weight="600" fill="#2D2D3E">SNN Drives</text>
      <rect x="110" y="235" width="300" height="100" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
      <text x="120" y="258" font-size="11" fill="#5A5A6E">arousal: 0.68 → 0.62 (-9%)</text>
      <text x="120" y="278" font-size="11" fill="#5A5A6E">valence: 0.72 → 0.70 (-3%)</text>
      <text x="120" y="298" font-size="11" fill="#5A5A6E">social: 0.65 → 0.63 (-3%)</text>
      <text x="120" y="318" font-size="11" fill="#5A5A6E">微弱衰减 · 基本稳定</text>
    </g>

    <!-- Modulators -->
    <g>
      <text x="110" y="365" font-size="14" font-weight="600" fill="#2D2D3E">调质浓度</text>
      <rect x="110" y="375" width="300" height="120" rx="8" fill="#FFE0EC" stroke="#C2185B" stroke-width="1.5"/>
      <text x="120" y="398" font-size="11" fill="#5A5A6E">curiosity: 0.58 → 0.55 (-5%)</text>
      <text x="120" y="418" font-size="11" fill="#5A5A6E">sociability: 0.62 → 0.60 (-3%)</text>
      <text x="120" y="438" font-size="11" fill="#5A5A6E">energy: 0.67 → 0.65 (-3%)</text>
      <text x="120" y="458" font-size="10" fill="#9B9BAA">τ ≈ 1800s 的调质尚未明显衰减</text>
      <text x="120" y="478" font-size="10" fill="#9B9BAA">基线保持稳定</text>
    </g>

    <!-- LLM expression -->
    <g>
      <text x="110" y="525" font-size="14" font-weight="600" fill="#2D2D3E">LLM 表达倾向</text>
      <rect x="110" y="535" width="300" height="170" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
      <text x="260" y="560" text-anchor="middle" font-size="12" font-style="italic" fill="#2D2D3E">「刚才去哪儿啦～」</text>
      <text x="120" y="585" font-size="10" fill="#5A5A6E">• 语气轻松，带好奇</text>
      <text x="120" y="605" font-size="10" fill="#5A5A6E">• 延续上次话题</text>
      <text x="120" y="625" font-size="10" fill="#5A5A6E">• 无明显情绪变化</text>
      <text x="120" y="645" font-size="10" fill="#5A5A6E">• 主动询问，保持参与感</text>
      <text x="120" y="670" font-size="9" fill="#9B9BAA">传统系统：无差异</text>
      <text x="120" y="687" font-size="9" fill="#4CAF50" font-weight="600">Neo-MoFox：微调语气</text>
    </g>
  </g>

  <!-- Column 2: 30min -->
  <g filter="url(#softShadow)">
    <rect x="515" y="120" width="370" height="620" rx="15" fill="#FFFFFF" stroke="#E91E63" stroke-width="2.5"/>
    <text x="700" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#C2185B">30 分钟</text>
    <text x="700" y="185" text-anchor="middle" font-size="12" fill="#6B6B7E">中度离开 · 明显衰减</text>

    <!-- SNN drives -->
    <g>
      <text x="545" y="225" font-size="14" font-weight="600" fill="#2D2D3E">SNN Drives</text>
      <rect x="545" y="235" width="300" height="100" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
      <text x="555" y="258" font-size="11" fill="#5A5A6E">arousal: 0.68 → 0.48 (-29%)</text>
      <text x="555" y="278" font-size="11" fill="#5A5A6E">valence: 0.72 → 0.60 (-17%)</text>
      <text x="555" y="298" font-size="11" fill="#5A5A6E">social: 0.65 → 0.52 (-20%)</text>
      <text x="555" y="318" font-size="11" fill="#C2185B" font-weight="600">显著衰减 · 进入低唤醒</text>
    </g>

    <!-- Modulators -->
    <g>
      <text x="545" y="365" font-size="14" font-weight="600" fill="#2D2D3E">调质浓度</text>
      <rect x="545" y="375" width="300" height="120" rx="8" fill="#FFE0EC" stroke="#C2185B" stroke-width="1.5"/>
      <text x="555" y="398" font-size="11" fill="#5A5A6E">curiosity: 0.58 → 0.48 (-17%)</text>
      <text x="555" y="418" font-size="11" fill="#5A5A6E">sociability: 0.62 → 0.53 (-15%)</text>
      <text x="555" y="438" font-size="11" fill="#5A5A6E">energy: 0.67 → 0.60 (-10%)</text>
      <text x="555" y="458" font-size="10" fill="#9B9BAA">短 τ 调质（如 curiosity）已明显</text>
      <text x="555" y="478" font-size="10" fill="#9B9BAA">向基线回归</text>
    </g>

    <!-- LLM expression -->
    <g>
      <text x="545" y="525" font-size="14" font-weight="600" fill="#2D2D3E">LLM 表达倾向</text>
      <rect x="545" y="535" width="300" height="170" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
      <text x="695" y="560" text-anchor="middle" font-size="12" font-style="italic" fill="#2D2D3E">「终于回来啦，想你了～」</text>
      <text x="555" y="585" font-size="10" fill="#5A5A6E">• 轻度想念情绪</text>
      <text x="555" y="605" font-size="10" fill="#5A5A6E">• 主动分享刚才的"想法"</text>
      <text x="555" y="625" font-size="10" fill="#5A5A6E">  （可能是做梦/离线巩固）</text>
      <text x="555" y="645" font-size="10" fill="#5A5A6E">• 唤醒需要 2-3 个心跳周期</text>
      <text x="555" y="670" font-size="9" fill="#9B9BAA">传统系统：无差异</text>
      <text x="555" y="687" font-size="9" fill="#F9A825" font-weight="600">Neo-MoFox：明显情感变化</text>
    </g>
  </g>

  <!-- Column 3: 3hr -->
  <g filter="url(#softShadow)">
    <rect x="950" y="120" width="370" height="620" rx="15" fill="#FFFFFF" stroke="#E91E63" stroke-width="2.5"/>
    <text x="1135" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#AD1457">3 小时</text>
    <text x="1135" y="185" text-anchor="middle" font-size="12" fill="#6B6B7E">长时间离开 · 深度调整</text>

    <!-- SNN drives -->
    <g>
      <text x="980" y="225" font-size="14" font-weight="600" fill="#2D2D3E">SNN Drives</text>
      <rect x="980" y="235" width="300" height="100" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
      <text x="990" y="258" font-size="11" fill="#5A5A6E">arousal: 0.68 → 0.35 (-49%)</text>
      <text x="990" y="278" font-size="11" fill="#5A5A6E">valence: 0.72 → 0.50 (-31%)</text>
      <text x="990" y="298" font-size="11" fill="#5A5A6E">social: 0.65 → 0.42 (-35%)</text>
      <text x="990" y="318" font-size="11" fill="#AD1457" font-weight="600">大幅衰减 · 进入"休眠"模式</text>
    </g>

    <!-- Modulators -->
    <g>
      <text x="980" y="365" font-size="14" font-weight="600" fill="#2D2D3E">调质浓度</text>
      <rect x="980" y="375" width="300" height="120" rx="8" fill="#FFE0EC" stroke="#C2185B" stroke-width="1.5"/>
      <text x="990" y="398" font-size="11" fill="#5A5A6E">curiosity: 0.58 → 0.42 (-28%)</text>
      <text x="990" y="418" font-size="11" fill="#5A5A6E">sociability: 0.62 → 0.48 (-23%)</text>
      <text x="990" y="438" font-size="11" fill="#5A5A6E">energy: 0.67 → 0.52 (-22%)</text>
      <text x="990" y="458" font-size="10" fill="#9B9BAA">所有调质全面向基线回归</text>
      <text x="990" y="478" font-size="10" fill="#9B9BAA">可能触发睡眠/做梦流水线</text>
    </g>

    <!-- LLM expression -->
    <g>
      <text x="980" y="525" font-size="14" font-weight="600" fill="#2D2D3E">LLM 表达倾向</text>
      <rect x="980" y="535" width="300" height="170" rx="8" fill="#E1BEE7" stroke="#8E24AA" stroke-width="1.5"/>
      <text x="1130" y="560" text-anchor="middle" font-size="12" font-style="italic" fill="#2D2D3E">「你回来啦！我刚做了个梦…」</text>
      <text x="990" y="585" font-size="10" fill="#5A5A6E">• 明显想念，带惊喜</text>
      <text x="990" y="605" font-size="10" fill="#5A5A6E">• 主动分享梦报告</text>
      <text x="990" y="625" font-size="10" fill="#5A5A6E">• 可能触发了做梦机制</text>
      <text x="990" y="645" font-size="10" fill="#5A5A6E">• 调质大幅刷新，能量恢复</text>
      <text x="990" y="670" font-size="9" fill="#9B9BAA">传统系统：无差异</text>
      <text x="990" y="687" font-size="9" fill="#8E24AA" font-weight="600">Neo-MoFox：离线巩固生效</text>
    </g>
  </g>

  <!-- Bottom summary -->
  <g>
    <rect x="80" y="755" width="1240" height="35" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
    <text x="700" y="777" text-anchor="middle" font-size="12" fill="#3D3D4E">对比总结：传统系统在任意时长后响应无差异；Neo-MoFox 的状态衰减使时间流逝"可见"，3hr 场景可触发做梦机制。</text>
  </g>

  <text x="700" y="795" text-anchor="middle" font-size="11" fill="#9B9BAA" font-style="italic">Figure F14 · Three Scenarios: State Evolution under 5min / 30min / 3hr User Absence</text>
</svg>
