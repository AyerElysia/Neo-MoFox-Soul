site_name: "Neo-MoFox 课程报告"
site_description: "面向自主 Agent 的连续感知-决策-执行系统架构 · 《智能感知与无人系统》课程报告"
site_author: "Elysia (爱莉希雅)"
site_url: "https://neo-mofox.github.io/report"

docs_dir: docs
site_dir: site

repo_name: "AyerElysia/Neo-MoFox-Soul"
repo_url: "https://github.com/AyerElysia/Neo-MoFox-Soul"

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  font:
    text: "Noto Sans SC"
    code: "JetBrains Mono"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    logo: material/brain
  favicon: https://api.iconify.design/mdi:heart-pulse.svg

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AyerElysia/Neo-MoFox-Soul
  generator: false

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
      title: 本页目录
  - tables
  - footnotes
  - attr_list
  - md_in_html

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: zh
  - awesome-pages

nav:
  - 主页: index.md
  - 摘要: chapters/00_abstract.md
  - 第一部分 · 立场与背景:
    - 第 1 章 · 导论: chapters/01_introduction.md
    - 第 2 章 · 背景与相关工作: chapters/02_related_work.md
    - 第 3 章 · 三大设计哲学: chapters/03_three_principles.md
  - 第二部分 · 系统架构:
    - 第 4 章 · 双意识系统总览: chapters/04_system_overview.md
  - 第三部分 · 子系统:
    - 第 5 章 · 脉冲神经网络: chapters/05_snn.md
    - 第 6 章 · 神经调质与昼夜节律: chapters/06_neuromodulation.md
    - 第 7 章 · 记忆系统: chapters/07_memory.md
    - 第 8 章 · 睡眠与做梦: chapters/08_sleep_and_dreams.md
  - 第四部分 · 中枢与接口:
    - 第 9 章 · 心跳与持久化: chapters/09_heartbeat_persistence.md
    - 第 10 章 · LifeChatter ↔ Life Engine 同步: chapters/10_dfc_nucleus_interface.md
    - 第 10.5 章 · LifeChatter Agent 工程: chapters/10b_agent_framework.md
  - 第五部分 · 验证与对比:
    - 第 11 章 · 涌现行为案例: chapters/11_case_studies.md
    - 第 12 章 · 系统定位与课程视角比较: chapters/12_comparison.md
  - 第六部分 · 反思与展望:
    - 第 13 章 · 局限、伦理与未来: chapters/13_limitations.md
    - 第 14 章 · 结论: chapters/14_conclusion.md
  - 附录:
    - 附录 A · 术语表: chapters/15_appendix_A_glossary.md
    - 附录 B · 关键配置参数摘要: chapters/15_appendix_B_config.md
    - 附录 C · 状态持久化结构摘要: chapters/15_appendix_C_schema.md
    - 附录 D · 可观测性 API 摘要: chapters/15_appendix_D_api.md
